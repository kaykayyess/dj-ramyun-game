/* ---------- utils ---------- */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b+1));
const easeOut=t=>1-Math.pow(1-clamp(t,0,1),3);
const easeIn=t=>Math.pow(clamp(t,0,1),3);
function hex2rgb(h){const n=parseInt(h.slice(1),16);return[n>>16&255,n>>8&255,n&255];}
function rgbStr(c,a=1){return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;}
function mixc(c1,c2,t){return [lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)];}

}

/* =========================================================
   AUDIO — realtime Web Audio synth, zero samples
   ========================================================= */
const A = { ctx:null, master:null, nextBeat:0, beatN:0, noiseBuf:null, muted:false, raw:{}, buf:{} };
function initAudio(){
  if (A.ctx){ if (A.ctx.state==='suspended') A.ctx.resume(); return; }
  try{
    const AC = window.AudioContext||window.webkitAudioContext;
    A.ctx = new AC();
    if (A.ctx.state==='suspended') A.ctx.resume();
    const comp=A.ctx.createDynamicsCompressor();
    comp.threshold.value=-14; comp.ratio.value=6;
    A.master=A.ctx.createGain(); A.master.gain.value=0.9;
    A.master.connect(comp); comp.connect(A.ctx.destination);
    const len=A.ctx.sampleRate*1.2;
    A.noiseBuf=A.ctx.createBuffer(1,len,A.ctx.sampleRate);
    const d=A.noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    for(const k in A.raw) decodeSFX(k);
    for(const k in A.mraw) decodeBGM(k);
  }catch(e){ A.ctx=null; }
}

/* ---------- sample SFX — the real product sounds (sfx/ folder) ---------- */
const SFX_KEY={ramyun:'ram',buldak:'bul',jjapa:'jja',neogury:'neo'};
const SFX_FILES={
  ram_t:'RAM button touch.mp3', bul_t:'BURR button touch.wav',
  jja_t:'JJAP button touch.wav', neo_t:'NEO button touch.wav',
  ram1:'RAM Play.wav',  ram2:'RAM2 Play.wav',  ram3:'Ram3 Play.wav',  ram4:'RAM4 Play.wav',
  bul1:'BURR Play.wav', bul2:'BURR2 Play.wav', bul3:'BURR3 Play.wav', bul4:'BURR4 Play.wav',
  jja1:'JJAP Play.wav', jja2:'JJAP2 Play.wav', jja3:'JJAP3 Play.wav', jja4:'JJAP4 Play.wav',
  neo1:'NEO Play.wav',  neo2:'NEO2 Play.wav',  neo3:'NEO3 Play.wav', neo4:'NEO4 Play.wav',
  guri1:'jjapagury play.mp3', guri2:'jjapagury2 play.mp3'
};
for(const k in SFX_FILES)          /* prefetch at load — decode after first tap unlocks audio */
  fetch('sfx/'+encodeURIComponent(SFX_FILES[k]))
    .then(r=>r.ok?r.arrayBuffer():Promise.reject(0))
    .then(b=>{ A.raw[k]=b; if(A.ctx) decodeSFX(k); })
    .catch(()=>{});
function decodeSFX(k){
  const b=A.raw[k]; if(!b||A.buf[k]) return;
  A.ctx.decodeAudioData(b.slice(0)).then(d=>{
    A.buf[k]=d;
    let pk=0; const ch=d.getChannelData(0);              /* peak-normalize to even levels */
    for(let i=0;i<ch.length;i+=4){ const a=Math.abs(ch[i]); if(a>pk) pk=a; }
    A.norm=A.norm||{}; A.norm[k]=clamp(0.9/(pk||1),0.6,2.4);
  }).catch(()=>{});
}
function chokeBuf(group){
  const p=A.grp&&A.grp[group];
  if(p&&A.ctx){ try{ p.g.gain.setTargetAtTime(0,A.ctx.currentTime,0.05); p.src.stop(A.ctx.currentTime+0.25); }catch(e){} }
}
function playBuf(k,v=1,rate=1,o={}){
  if(A.muted) return true;
  const b=A.buf[k]; if(!b||!A.ctx) return false;
  const t=A.ctx.currentTime;
  if(o.group){                       /* choke: one sound per group — new one cuts the old */
    A.grp=A.grp||{};
    const prev=A.grp[o.group];
    if(prev){ const fast=o.cut==='fast';
      try{ prev.g.gain.setTargetAtTime(0,t,fast?0.03:0.14); prev.src.stop(t+(fast?0.18:0.9)); }catch(e){} }   /* 중첩 시 크로스페이드 (fast=즉시 컷) */
  }
  const src=A.ctx.createBufferSource(); src.buffer=b; src.playbackRate.value=rate;
  let off=0;
  if(o.skipSilence){ A.lead=A.lead||{};
    if(A.lead[k]===undefined){ const ch=b.getChannelData(0); let i=0;
      while(i<ch.length&&Math.abs(ch[i])<0.02) i++; A.lead[k]=i/b.sampleRate; }
    off=A.lead[k]; }
  const vv=v*((A.norm&&A.norm[k])||1);
  const g=A.ctx.createGain(); g.gain.value=vv;
  src.connect(g); g.connect(A.master); src.start(0,off);
  bgmDuck();
  if(o.dur){                         /* trim long stingers with a clean fade */
    g.gain.setValueAtTime(vv,t+Math.max(0.05,o.dur-0.3));
    g.gain.linearRampToValueAtTime(0,t+o.dur);
    try{ src.stop(t+o.dur+0.05); }catch(e){}
  }
  if(o.group) A.grp[o.group]={src,g};
  return true;
}
const anow=()=> A.ctx ? A.ctx.currentTime : performance.now()/1000;
/* game clock — independent from the audio clock so a suspended
   AudioContext can never freeze the gameplay timeline */
const pnow=()=> performance.now()/1000;

function tone(o){
  if(!A.ctx||A.muted) return;
  const t=o.t??anow();
  const osc=A.ctx.createOscillator(); osc.type=o.type||'sine';
  osc.frequency.setValueAtTime(o.f0||440,t);
  if(o.f1) osc.frequency.exponentialRampToValueAtTime(Math.max(1,o.f1), t+(o.gt||o.dur||0.2));
  const g=A.ctx.createGain();
  const v=o.v??0.25, atk=o.a??0.004, dur=o.dur??0.2;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0002,v),t+atk);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  let head=osc;
  if(o.filter){ const f=A.ctx.createBiquadFilter(); f.type=o.filter; f.frequency.value=o.ff||800; f.Q.value=o.q||1; osc.connect(f); head=f; }
  head.connect(g); g.connect(A.master);
  osc.start(t); osc.stop(t+dur+0.05);
}
function noiseHit(o){
  if(!A.ctx||A.muted) return;
  const t=o.t??anow();
  const src=A.ctx.createBufferSource(); src.buffer=A.noiseBuf; src.playbackRate.value=o.rate||1;
  const f=A.ctx.createBiquadFilter(); f.type=o.type||'bandpass'; f.Q.value=o.q||0.9;
  f.frequency.setValueAtTime(o.f0||1500,t);
  if(o.f1) f.frequency.exponentialRampToValueAtTime(o.f1,t+(o.dur||0.1));
  const g=A.ctx.createGain(); const v=o.v??0.2, dur=o.dur??0.08;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(v,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(f); f.connect(g); g.connect(A.master);
  src.start(t); src.stop(t+dur+0.05);
}
const kick =(t,v=0.5)=>{tone({t,type:'sine',f0:160,f1:40,gt:0.1,dur:0.22,v});noiseHit({t,type:'lowpass',f0:900,dur:0.02,v:v*0.22});};
const hat  =(t,v=0.1)=>noiseHit({t,type:'highpass',f0:7500,dur:0.035,v});
const snare=(t,v=0.3)=>{noiseHit({t,type:'bandpass',f0:1900,q:0.6,dur:0.12,v});tone({t,type:'triangle',f0:200,f1:150,dur:0.09,v:v*0.7});};
const clap =(t,v=0.25)=>{for(let i=0;i<3;i++)noiseHit({t:t+i*0.012,type:'bandpass',f0:1300,q:1.4,dur:0.05,v:v*(1-i*0.2)});};
const bassN=(t,f,dur,v=0.25)=>tone({t,type:'sawtooth',f0:f,dur,v,filter:'lowpass',ff:320,q:1.2});

/* ---------- SVG 아트 (art/ 폴더): 마스코트 + 코믹 타이포 ---------- */
const ART_FILES={
  m_ramyun:'Ram.svg', m_buldak:'Burr.svg', m_jjapa:'jjap.svg', m_neogury:'Neo.svg',
  t_kidding:'Areyoukiddingme.svg', t_boss:'Bosslevel 2.svg',
  t_egg:'Droptheegg.svg', t_mix:'In the mix!.svg', t_sauce:'Inthesauce.svg',
  t_onfire:'Onfire.svg', t_shots:'Shots!!.svg',
  t_letsgo:'Letsgo!.svg', t_slurp:'후루룹.svg',
  t_banger:'Thatsabanger.svg', t_monster:'Thatsamonster.svg',
  t_illegal:'That’sillegal.svg', t_crazy:'Youcrazy.svg', t_hits:'Youcookinhits!.svg',
  t_ddrip:'Doubledrip.svg', t_triple:'Tripletailsbaby!.svg', t_dfire:'Double fire!.svg',
  t_sesh:'Timeforcokinsesh.svg',
  logo:'DJ_Ramyun_logo_800x800.png',
};
const ART={};
for(const k in ART_FILES){
  const im=new Image();
  im.onload=()=>{ ART[k]=im; };
  im.src='art/'+encodeURIComponent(ART_FILES[k]);
}
function drawArt(k,x,y,h,alpha=1){          /* h=박스 높이. 로드 전이면 false → 텍스트 폴백 */
  const im=ART[k]; if(!im) return false;
  const w=h*(im.width/im.height);
  ctx.save(); ctx.globalAlpha*=alpha;
  ctx.drawImage(im,x-w/2,y-h/2,w,h);
  ctx.restore();
  return true;
}

function tapFX(f,v=1){
  if(!A.ctx)return; const t=anow();
  if(f==='ramyun'){ tone({t,type:'square',f0:880,f1:1320,gt:0.05,dur:0.13,v:0.16*v,filter:'lowpass',ff:5200});
    tone({t:t+0.02,type:'sine',f0:1760,dur:0.09,v:0.08*v}); }
  else if(f==='buldak'){ tone({t,type:'sawtooth',f0:220,f1:70,gt:0.09,dur:0.14,v:0.3*v,filter:'lowpass',ff:1800});
    noiseHit({t,type:'highpass',f0:2500,dur:0.06,v:0.14*v}); }
  else if(f==='jjapa'){ tone({t,type:'triangle',f0:330,f1:415,gt:0.07,dur:0.14,v:0.3*v});
    tone({t,type:'triangle',f0:165,dur:0.1,v:0.14*v}); }
  else if(f==='neogury'){ tone({t,type:'sine',f0:220,f1:196,gt:0.05,dur:0.07,v:0.3*v});
    tone({t:t+0.06,type:'sine',f0:196,f1:233,gt:0.05,dur:0.09,v:0.26*v}); }
}
function dropFX(f,v=1){
  if(!A.ctx)return; const t=anow();
  if(f==='ramyun'){
    for(let i=0;i<4;i++) kick(t+i*0.16,0.5*v);
    clap(t+0.32,0.3*v);
    [523,659,784,988].forEach(fq=>{ tone({t:t+0.02,type:'square',f0:fq,dur:0.42,v:0.06*v,filter:'lowpass',ff:3600});
      tone({t:t+0.5,type:'square',f0:fq,dur:0.5,v:0.05*v,filter:'lowpass',ff:3000}); });
    hat(t+0.08,0.1*v);hat(t+0.24,0.1*v);hat(t+0.4,0.1*v);hat(t+0.56,0.12*v);
  }else if(f==='buldak'){
    tone({t,type:'sine',f0:55,f1:41,gt:1.1,dur:1.25,v:0.55*v});
    snare(t+0.1,0.42*v); snare(t+0.62,0.35*v);
    tone({t:t+0.05,type:'sawtooth',f0:880,f1:1760,gt:0.28,dur:0.5,v:0.1*v,filter:'bandpass',ff:2200,q:2});
    tone({t:t+0.55,type:'sawtooth',f0:1760,f1:660,gt:0.4,dur:0.6,v:0.09*v,filter:'bandpass',ff:1800,q:2});
    for(let i=0;i<6;i++) hat(t+0.65+i*0.07,0.1*v);
    noiseHit({t,type:'lowpass',f0:900,dur:0.3,v:0.16*v});
  }else if(f==='jjapa'){
    [392,494,587,740].forEach((fq,i)=>tone({t:t+i*0.13,type:'triangle',f0:fq,dur:0.3,v:0.2*v}));
    [98,98,123,87].forEach((fq,i)=>bassN(t+i*0.16,fq,0.14,0.3*v));
    for(let i=0;i<8;i++) hat(t+0.55+i*0.055,0.08+((i%2)?0.04:0));
    kick(t,0.45*v); kick(t+0.62,0.4*v); snare(t+0.31,0.24*v);
  }else if(f==='neogury'){
    tone({t,type:'sine',f0:110,f1:55,gt:1.2,dur:1.4,v:0.5*v});
    [220,277,330].forEach(fq=>tone({t:t+0.1,type:'sawtooth',f0:fq,dur:1.1,v:0.045*v,filter:'lowpass',ff:900}));
    kick(t+0.3,0.4*v); kick(t+0.9,0.28*v); kick(t+1.2,0.18*v);
    noiseHit({t:t+0.35,type:'bandpass',f0:500,f1:220,q:2,dur:0.5,v:0.08*v});
  }
}
/* short vinyl scratch — the music keeps going */
function scratchFX(){
  if(!A.ctx)return; const t=anow();
  noiseHit({t,type:'bandpass',f0:2600,f1:400,q:2.5,dur:0.16,v:0.28});
  tone({t,type:'sawtooth',f0:420,f1:110,gt:0.14,dur:0.18,v:0.16,filter:'lowpass',ff:1500});
}
function slurpFX(){
  const ks=['slurp1','slurp2','slurp3'].filter(k=>A.buf[k]);
  if(ks.length){
    A.slurpIdx=((A.slurpIdx||0)+1)%ks.length;          /* 매 그릇 다른 후루룹 — 로테이션 */
    if(playBuf(ks[A.slurpIdx],1.0,1,{group:'slurp'})) return;
  }
  if(!A.ctx)return; const t=anow();
  for(let i=0;i<3;i++){ const tt=t+i*0.2;
    noiseHit({t:tt,type:'bandpass',f0:600,f1:2400,q:2.2,dur:0.18,v:0.32});
    tone({t:tt,type:'sine',f0:300,f1:700,gt:0.14,dur:0.16,v:0.14}); }
  tone({t:t+0.7,type:'sine',f0:523,f1:1046,gt:0.2,dur:0.3,v:0.16});
  tone({t:t+1.05,type:'sine',f0:740,f1:330,gt:0.35,dur:0.45,v:0.11}); /* 캬~ */
}
function coinFX(){ if(!A.ctx)return; const t=anow();
  tone({t,type:'square',f0:990,dur:0.08,v:0.15}); tone({t:t+0.08,type:'square',f0:1320,dur:0.3,v:0.15}); }
/* THE DROP — riser, one beat of silence, then the 808 sub hits */
function dropTheBassFX(){
  if(!A.ctx)return; const t=anow();
  tone({t,type:'sawtooth',f0:220,f1:1760,gt:0.5,dur:0.55,v:0.12,filter:'bandpass',ff:1400,q:1.5});
  noiseHit({t,type:'highpass',f0:900,f1:4000,dur:0.55,v:0.1});
  const d=t+0.62;
  tone({t:d,type:'sine',f0:72,f1:34,gt:1.6,dur:2.3,v:0.8});
  noiseHit({t:d,type:'lowpass',f0:500,dur:0.4,v:0.3});
  for(let i=0;i<9;i++) kick(d+i*0.21,0.5);
  for(let i=0;i<4;i++) clap(d+0.42+i*0.42,0.28);
  for(let i=0;i<18;i++) hat(d+i*0.105,0.08);
}
function feverFX(){ if(!A.ctx)return; const t=anow();

/* ---------- BGM: 직접 만든 비트 루프 (sfx/BEAT1·BEAT2) ---------- */
A.MUSIC_BPM={beat1:90.7,beat2:92.2};   /* 자기상관 실측값 */

                 beat2:['BEAT2.wav','BEAT2.mp3','beat2.wav','beat2.mp3','Beat2.wav','Beat2.mp3']};
A.mraw={}; A.mbuf={}; A.bgm=null; A.bgmKey='';
/* 추가 SFX 후보(파일 넣으면 자동 활성): 후루룩 먹는 소리 · 냄비 보글보글 루프 */
const EXTRA_SFX={slurp1:['SLURP1.wav'],slurp2:['SLURP2.wav'],slurp3:['SLURP3.wav'],
                 boil:['BOIL.wav','BOIL.mp3','boil.wav','boil.mp3']};

  } })();

for(const k in BGM_FILES){
  (async()=>{ for(const f of BGM_FILES[k]){
    try{ const r=await fetch('sfx/'+encodeURIComponent(f)); if(!r.ok) continue;
      A.mraw[k]=await r.arrayBuffer(); if(A.ctx) decodeBGM(k); return; }catch(e){}
  } })();

function decodeBGM(k){
  const b=A.mraw[k]; if(!b||A.mbuf[k]) return;
  A.ctx.decodeAudioData(b.slice(0)).then(d=>{
    A.mbuf[k]=d;
    const ch=d.getChannelData(0), sr=d.sampleRate;      /* mp3 앞뒤 무음 트림 → 루프·그리드 정확 */
    let i0=0; while(i0<ch.length&&Math.abs(ch[i0])<0.02) i0++;
    let i1=ch.length-1; while(i1>i0&&Math.abs(ch[i1])<0.02) i1--;
    A.mtrim=A.mtrim||{}; A.mtrim[k]={lead:i0/sr,end:(i1+1)/sr};
  }).catch(()=>{});
}
function bgmStop(){
  if(A.bgm){ try{ A.bgm.g.gain.setTargetAtTime(0,A.ctx.currentTime,0.3); A.bgm.src.stop(A.ctx.currentTime+1); }catch(e){}
    A.bgm=null; A.bgmKey=''; }
}
function bgmUpdate(){
  if(!A.ctx){ return; }
  if(A.boil){ try{ A.boil.g.gain.setTargetAtTime(0,A.ctx.currentTime,0.2); A.boil.src.stop(A.ctx.currentTime+0.8); }catch(e){} A.boil=null; }
  if(A.muted) return;
  if(G.state!=='game'){ if(A.bgm) bgmStop(); return; }
  for(const k in A.mraw) decodeBGM(k);
  const want=(G.fever||G.time<G.drop)&&A.mbuf.beat2?'beat2':A.mbuf.beat1?'beat1':A.mbuf.beat2?'beat2':'';
  if(!want||want===A.bgmKey) return;
  bgmStop();
  const src=A.ctx.createBufferSource(); src.buffer=A.mbuf[want]; src.loop=true;
  const g=A.ctx.createGain(); g.gain.value=0.001;
  g.gain.setTargetAtTime(0.34,A.ctx.currentTime,0.25);   /* 효과음이 주인공 — 비트는 받쳐주는 볼륨 */
  src.connect(g); g.connect(A.master);
  const tr=(A.mtrim&&A.mtrim[want])||{lead:0,end:src.buffer.duration};
  src.loopStart=tr.lead; src.loopEnd=tr.end;           /* 무음 없는 구간만 루프 → 드리프트 방지 */
  /* 앵커 = 첫 비트가 '귀에 닿는' pnow 시각 (출력 레이턴시 보정) */
  const lat=A.ctx.outputLatency||A.ctx.baseLatency||0;
  let when=A.ctx.currentTime+0.05, earAt=pnow()+0.05+lat;
  if(A.bgmAnchor&&A.bgmBpm){                           /* 트랙 전환도 기존 박자선 위에서 */
    const bl=60/A.bgmBpm;
    const wait=(bl-(((earAt-A.bgmAnchor)%bl)+bl)%bl)%bl;
    when+=wait; earAt+=wait;
  }
  src.start(when,tr.lead);
  A.bgmAnchor=earAt; A.bgmBpm=A.MUSIC_BPM[want]||90;
  A.bgm={src,g}; A.bgmKey=want;
}
function boilUpdate(){
  if(!A.ctx) return;
  const want=G.state==='game'&&!A.muted&&A.buf.boil;
  if(want&&!A.boil){
    const src=A.ctx.createBufferSource(); src.buffer=A.buf.boil; src.loop=true;
    if(!A.boilTrim){                                   /* 앞뒤 무음 잘라 心지 구간만 루프 */
      const ch=src.buffer.getChannelData(0), sr=src.buffer.sampleRate;
      let i0=0; while(i0<ch.length&&Math.abs(ch[i0])<0.02) i0++;
      let i1=ch.length-1; while(i1>i0&&Math.abs(ch[i1])<0.02) i1--;
      A.boilTrim={a:i0/sr+0.1, b:(i1+1)/sr-0.1};
    }
    src.loopStart=A.boilTrim.a; src.loopEnd=Math.max(A.boilTrim.a+1,A.boilTrim.b);
    const g=A.ctx.createGain(); g.gain.value=0.001;
    g.gain.setTargetAtTime(0.14,A.ctx.currentTime,0.5);   /* 배경에 깔리는 보글보글 */
    src.connect(g); g.connect(A.master); src.start(0,A.boilTrim?A.boilTrim.a:0);
    A.boil={src,g};
  }else if(!want&&A.boil){
    try{ A.boil.g.gain.setTargetAtTime(0,A.ctx.currentTime,0.3); A.boil.src.stop(A.ctx.currentTime+1); }catch(e){}
    A.boil=null;
  }
}
function bgmDuck(){                                      /* 사이드체인: 버튼 소리 순간 비트가 눌림 */
  if(!A.bgm) return;
  const t=A.ctx.currentTime, g=A.bgm.g.gain;
  g.cancelScheduledValues(t);
  g.setTargetAtTime(0.14,t,0.015);
  g.setTargetAtTime(0.34,t+0.13,0.14);
}

function schedulerUpdate(){
  if(!A.ctx||G.state!=='game'||A.muted) return;
  bgmUpdate();
  if(A.bgm) return;                                      /* 비트 파일이 돌면 신스 비트는 침묵 */
  const spb=60/G.bpm;
  if(A.nextBeat < anow()-0.4) A.nextBeat = anow()+0.05;
  while(A.nextBeat < anow()+0.18){
    const t=A.nextBeat, n=A.beatN, b=n%8, sw=spb*0.56;   /* 스윙 오프셋 */
    /* 붐뱁 킥: 정박 + 엇박 */
    if(b===0||b===2||b===5) kick(t,0.45);
    if(b===3) kick(t+sw,0.3);
    if(b===6&&(n>>3)%2===1) kick(t+spb/2,0.26);
    /* 스윙 햇 + 고콤보 16비트 시즐 */
    if(G.combo>=4){
      hat(t,0.12); hat(t+sw,b%2?0.09:0.055);
      if(G.combo>=30&&b%2===1) hat(t+spb*0.25,0.045);
    }
    /* 스네어 2·4박 + 고스트 노트 */
    if(G.combo>=8){
      if(b%2===1) snare(t,0.25);
      if(b===6) snare(t+sw,0.08);
    }
    /* 베이스 — 현재 flavor 루트를 따라가는 펜타토닉 라인 */
    if(G.combo>=14){
      const root={ramyun:55,buldak:49,jjapa:41.2,neogury:46.2,jjaguri:43.7}[bgFlavor()]||55;
      const mel=[1,0,1.5,0, 1,1.19,0,0.75][b];
      if(mel) bassN(t,root*mel,spb*0.7,0.21);
    }
    if(G.fever&&b%4===0) clap(t,0.18);
    /* 8박마다 바 마무리 필 */
    if(b===7){
      if(G.combo>=8){ snare(t+spb*0.5,0.11); snare(t+spb*0.75,0.16); }
      noiseHit({t:t+spb*0.5,type:'highpass',f0:9000,dur:0.18,v:0.05});
    }
    A.nextBeat+=spb; A.beatN++;
  }
}

/* =========================================================
   GAME STATE — continuous, Tetris-like
   ========================================================= */
const G = {
  state:'attract', stateT:0, time:0,
  score:0, lives:3, combo:0, maxCombo:0, bowls:0, orderCount:0, perfectOrders:0,
  best:+(localStorage.getItem('djr_best')||0), newBest:false,
  bpm:96, notes:[], noteIdx:0, cursorT:0, curOrderNo:0,
  fever:false, comboT:-9, dmg:0, dying:0, eat:null, drop:0, dropT0:0, tut:false, diff:0,
  fx:[], toasts:[], confetti:[],
  shake:0, flash:0, flashCol:[255,255,255],
  bg:hex2rgb('#F5B31B'),
  padRects:[], padPress:{}, btnRects:{}

const diffMult=()=>1+(G.diff||0)*1.5;
function windows(){ let l = clamp(1.5 - 0.65*(G.diff||0), 0.85, 1.5);
  if(G.tut) l*=1.35;                               /* 연습 주문은 아주 관대하게 */
  return { p:0.09*l, g:0.18*l, b:0.27*l }; }

function orderParams(no){
  /* 음악이 있으면 노트도 음악 BPM 그대로 — 난이도는 밀도로 올린다 */
  const mkey=A.bgmKey||(A.mbuf&&(A.mbuf.beat1?'beat1':A.mbuf.beat2?'beat2':''))||'';
  const bpm = mkey ? A.MUSIC_BPM[mkey] : Math.min(86+(no-1)*1.8, 160);
  const r=Math.random();
  const secN = no<=14?1 : no<=20?(r<0.3?2:1) : (r<0.12?3:r<0.6?2:1); /* 한 사람당 보통 1개 */
  const mx = no<=8?2 : no<=14?3 : 4;
  const tap = no<20?1 : 0.5;                       /* 더블타임도 정확히 반박자 그리드 */
  return {bpm, secN, mn:1, mx, tap};
}
function pushOrder(){
  const no=++G.orderCount;
  const p=orderParams(no);
  const spb=60/p.bpm;
  const order={no, total:0, hit:0, miss:0, customer:pickCust(), bpm:p.bpm, counts:{}, sections:[]};
  /* a real order: usually one item, sometimes two, more when the shop gets slammed */
  let pool=[...SEQ];
  const secs=[];
  if(no>=3 && Math.random()<0.38){ secs.push('jjaguri'); pool=pool.filter(f=>f!=='jjapa'&&f!=='neogury'); }
  while(secs.length<p.secN && pool.length) secs.push(pool.splice(irand(0,pool.length-1),1)[0]);
  if(!secs.length) secs.push('ramyun');
  G.diff=Math.min(1,(no-1)/26);                    /* 난이도 지표 (판정창·점수 배율) */
  const gap = Math.max(2, Math.round(4.4 - no*0.13));  /* 정수 박자 → 그리드 유지 */
  let t=G.cursorT;
  if(A.bgmAnchor&&A.bgmBpm){                       /* 음악 박자선에 스냅 */
    const bl=60/A.bgmBpm;
    t=A.bgmAnchor+Math.ceil((t-A.bgmAnchor)/bl-1e-4)*bl;
  }
  for(const f of secs){
    if(f==='jjaguri'){
      const n=irand(1,2);                          /* 짜파구리 1개=짜파1+너1 · 2개=짜파2+너2 */
      order.counts[f]=n; order.sections.push({key:f,n});
      order.total+=n*2+1;
      for(let i=0;i<n;i++){ G.notes.push({type:'tap',flavor:'jjapa',sec:f,time:t,order,bpm:p.bpm}); t+=spb*p.tap; }
      for(let i=0;i<n;i++){ G.notes.push({type:'tap',flavor:'neogury',sec:f,time:t,order,bpm:p.bpm}); t+=spb*p.tap; }
    }else{
      const n=irand(p.mn,p.mx);
      order.counts[f]=n; order.sections.push({key:f,n});
      order.total+=n+1;
      for(let i=0;i<n;i++){ G.notes.push({type:'tap',flavor:f,sec:f,time:t,order,bpm:p.bpm}); t+=spb*p.tap; }
    }
    G.notes.push({type:'play',flavor:f,sec:f,time:t,order,bpm:p.bpm}); t+=spb*gap;
  }
  G.notes[G.notes.length-1].last=true;
  G.cursorT=t+spb;
}

function startGame(){

/* ---------- judgment ---------- */
function padTap(pad){
  if(G.state==='attract'){ initAudio(); coinFX(); startGame(); return; }
  if(G.state!=='game'||G.dying) return;
  G.padPress[pad]=G.time;
  const note=G.notes[G.noteIdx]; if(!note) return;
  const w=windows();
  const dt=pnow()-note.time;
  if(dt < -w.b) return;                              // way early → ignore
  const need = note.type==='play' ? 'play' : note.flavor;
  if(pad!==need){ markMiss(note,'wrong'); return; }  // wrong pad = that note is lost
  const a=Math.abs(dt);
  applyJudge(a<=w.p?'perfect':a<=w.g?'good':'bad', note);
}
function applyJudge(j,note){
  const mult=j==='perfect'?1:j==='good'?0.7:0.3;
  const pts=Math.round(100*mult*diffMult()*(1+G.combo/100))*(G.fever?2:1)*(G.time<G.drop?3:1);
  G.score+=pts;
  if(j==='bad') G.combo=0;
  else{
    G.combo++; G.comboT=G.time;
    G.maxCombo=Math.max(G.maxCombo,G.combo);
    if(G.combo===20){ spawnFX({kind:'banner',text:'🔥 FEVER ×2 — 점수 두 배! 🔥',t0:G.time}); feverFX(); }
    if(G.combo>=25 && G.combo%25===0){             /* 25 단위 콤보 축포 */
      G.flash=0.5; G.flashCol=[255,205,60];
      G.shake=Math.max(G.shake,7);
      const mk=G.combo>=125?'t_boss':G.combo>=100?'t_crazy':G.combo>=75?'t_illegal':G.combo>=50?'t_monster':'t_hits';
      spawnFX({kind:'artslam',art:mk,t0:G.time});
      feverFX();
      for(let i=0;i<18;i++) G.confetti.push({x:SW*0.5+rand(-SW*0.22,SW*0.22),y:SH*0.38,vx:rand(-90,90),vy:rand(-190,-70),rot:rand(0,6.3),vr:rand(-5,5),c:['#F2C14E','#ffe95e','#fff','#E8431F'][i%4],s:rand(4,9)});
    }
  }
  G.fever = G.combo>=20;
  judgeFX(j);
  const vol=j==='perfect'?1:j==='good'?0.7:0.35;
  const R=regions();
  if(note.type==='play'){
    const serv=clamp(note.order.counts[note.sec||note.flavor]||1,1,4);
    let played=false;
    if(note.flavor==='jjaguri')        /* 짜파구리: 전용 스팅어만, 이전 소리 즉시 컷 */
      played=playBuf('guri'+serv,vol*0.95,1,{group:'play',cut:'fast',skipSilence:true})
           ||playBuf('jja'+serv,vol*0.9,1,{group:'play',cut:'fast',skipSilence:true});
    else played=playBuf(SFX_KEY[note.flavor]+serv,vol*0.9,1,{group:'play',skipSilence:true});
    if(!played) dropFX(note.flavor,vol);
    spawnFX({kind:'drop',flavor:note.flavor,t0:G.time});   /* 타이포 = 사운드 시작과 동시 */
    G.flash=0.45; G.flashCol=hex2rgb(FLAVORS[note.flavor].color);
    G.shake=Math.max(G.shake,j==='perfect'?9:5);
    T3.punch=1; T3.burst=1;
    if(T3.ok) T3.showTop(note.flavor);
  }else{
    if(!playBuf(SFX_KEY[note.flavor]+'_t',vol)) tapFX(note.flavor,vol);
    if(T3.ok) T3.addNoodle();
    if(j==='perfect') for(let i=0;i<6;i++)
      spawnFX({kind:'spark',x:R.judgeX,y:R.railY,a:rand(0,6.3),v:rand(60,190),c:FLAVORS[note.flavor].color,t0:G.time});
  }
  spawnFX({kind:'judge',j,x:R.judgeX,y:R.railY-SH*0.008,t0:G.time});
  spawnFX({kind:'ring',x:R.judgeX,y:R.railY,color:FLAVORS[note.flavor].color,t0:G.time,big:note.type==='play',pow:j==='perfect'?1:0.55});
  note.judged=j; note.order.hit++;
  G.noteIdx++;
  if(note.last) finishOrder(note.order);
}
function markMiss(note,reason){
  note.judged='miss'; note.order.miss++;
  G.combo=0; G.fever=false;
  if(!(G.tut&&note.order.no===1)) G.lives--;       /* 연습 주문은 하트가 안 닳는다 */
  G.dmg=1; G.shake=Math.max(G.shake,8); T3.shake3=1;
  scratchFX();
  const R=regions();
  spawnFX({kind:'judge',j:'miss',x:R.judgeX,y:R.railY-SH*0.008,t0:G.time});
  spawnFX({kind:'heartbreak',t0:G.time});
  G.noteIdx++;

  if(G.lives<=0 && !G.dying){ G.dying=G.time; }
}
function domOf(order){
  let bf='ramyun',n=-1;
  for(const s of (order.sections||[])) if(order.counts[s.key]>n){ n=order.counts[s.key]; bf=s.key; }
  return bf;
}
function finishOrder(order){
  const ratio=order.hit/order.total;
  if(T3.ok) T3.serveClear();   // the pot is emptied — bowl handed to the customer
  if(G.tut&&order.no===1){ G.tut=false; localStorage.setItem('djr_tut','1');
    spawnFX({kind:'banner',text:'✨ 연습 끝 — 진짜 영업 시작!!',t0:G.time}); }
  if(order.miss===0){
    const b=Math.round(1000*diffMult())*(G.fever?2:1);

    G.pStreak=(G.pStreak||0)+1;                    /* 연속 퍼펙트 콜아웃 (드랍 순간엔 생략 — 한 번에 하나만) */
    if(!(order.counts.jjaguri&&!G.dying)){
      if(G.pStreak===2) spawnFX({kind:'artslam',art:'t_ddrip',t0:G.time+0.5});
      else if(G.pStreak===3) spawnFX({kind:'artslam',art:'t_triple',t0:G.time+0.5});
      else if(G.pStreak===5) spawnFX({kind:'artslam',art:'t_dfire',t0:G.time+0.5});
    }
    const gotHeart = G.lives<3;
    if(gotHeart) G.lives=Math.min(3,G.lives+1);
    if(!order.counts.jjaguri) slurpFX();          /* 드랍이 대신 울린다 */
    if(gotHeart) heartFX();
    G.eat={t0:G.time,customer:order.customer,bonus:b,perfect:true,heart:gotHeart,flavor:domOf(order)};
    for(let i=0;i<22;i++) G.confetti.push({x:rand(0,SW),y:rand(-SH*0.1,0),vx:rand(-30,30),vy:rand(60,160),rot:rand(0,6.3),vr:rand(-4,4),c:FLAVORS[SEQ[i%4]].color,s:rand(4,9)});
    /* 짜파구리 퍼펙트 = THE DROP!! turntable spins up, everything ×3 */
    if(order.counts.jjaguri && !G.dying){
      const already=G.time<G.drop;                /* 연속 드랍: 시간만 연장, 사운드 중첩 금지 */
      G.drop=G.time+5.2; if(!already) G.dropT0=G.time;
      /* 오디오는 짜파구리 전용 스팅어 하나만 — 드랍은 비주얼로 말한다 */
      T3.punch=1.4; T3.burst=1.6; G.shake=Math.max(G.shake,10);
      for(let i=0;i<30;i++) G.confetti.push({x:rand(0,SW),y:rand(-SH*0.15,0),vx:rand(-60,60),vy:rand(80,220),rot:rand(0,6.3),vr:rand(-5,5),c:['#F2C14E','#E8431F','#FFF6E0'][i%3],s:rand(5,10)});
    }
  }else if(ratio>=0.6){
    G.pStreak=0;
    const b=Math.round(400*diffMult());
    G.score+=b; G.bowls++;
    slurpFX();
    G.eat={t0:G.time,customer:order.customer,bonus:b,perfect:false,heart:false,flavor:domOf(order)};
  }else{
    G.pStreak=0;
    G.toasts.push({kind:'angry',t0:G.time,order});
  }
}

/* ---------- flow update ---------- */
function update(dt){
  updateFX(dt);
  if(G.state!=='game'){ if(A.bgm) bgmStop(); return; }
  schedulerUpdate();
  // keep the conveyor stocked
  if(G.cursorT - pnow() < 10) pushOrder();
  if(G.noteIdx>220){ G.notes.splice(0,200); G.noteIdx-=200; }
  const cn=G.notes[G.noteIdx];
  if(cn){
    if(cn.bpm!==G.bpm) G.bpm=cn.bpm;
    if(cn.order.no!==G.curOrderNo){
      G.curOrderNo=cn.order.no;
      G.toasts.push({kind:'order',t0:G.time,order:cn.order});
    }
    /* each section = one bowl: pot resets and is sized by that section's servings (1~4) */
    const sk=cn.sec||cn.flavor, sec=cn.order.no+'-'+sk;
    if(sec!==G.curSection){
      G.curSection=sec;
      if(T3.ok){ T3.serveClear(); T3.setPotFor((sk==='jjaguri'?2:1)*cn.order.counts[sk]); }  /* 짜파구리 1개=2봉지 규모 */
    }
    if(!G.dying && pnow() > cn.time + windows().b) markMiss(cn,'late');
  }
  if(G.dying && G.time-G.dying>1.15){
    if(G.score>G.best){ G.best=G.score; localStorage.setItem('djr_best',G.best); G.newBest=true; }
    setState('over');
  }
}

/* =========================================================
   FX
   ========================================================= */
function spawnFX(o){
  const BIG=['banner','drop','artslam'];
  if(BIG.includes(o.kind)) G.fx=G.fx.filter(f=>!BIG.includes(f.kind));
  if(G.fx.length<80) G.fx.push(o);
}
function updateFX(dt){
  G.fx=G.fx.filter(f=>G.time-f.t0 < ((f.kind==='banner'||f.kind==='artslam')?1.4:0.8));
  G.toasts=G.toasts.filter(t=>G.time-t.t0<1.9);
  for(const c of G.confetti){ c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=140*dt; c.rot+=c.vr*dt; }
  G.confetti=G.confetti.filter(c=>c.y<SH+30);
  G.shake=Math.max(0,G.shake-dt*40);
  G.flash=Math.max(0,G.flash-dt*2.2);
  G.dmg=Math.max(0,G.dmg-dt*1.8);
}
