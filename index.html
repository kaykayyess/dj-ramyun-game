function resize3D(){
  if(!T3.ok) return;
  T3.renderer.setPixelRatio(DPR);
  T3.camera.aspect=SW/VH; T3.camera.updateProjectionMatrix();
  T3.renderer.setSize(SW,VH,false);
}
function update3D(dt){
  if(!T3.ok) return;
  T3.punch=Math.max(0,T3.punch-dt*2.6);
  T3.burst=Math.max(0,T3.burst-dt*1.4);
  T3.shake3=Math.max(0,T3.shake3-dt*3.2);
  const fb=FLAVORS[bgFlavor()];
  /* LP spin */
  const dropOn=G.time<G.drop;
  T3.lp.rotation.y -= dt*(1.3+Math.min(2.4,G.combo*0.07)+T3.punch*6+(dropOn?9:0));
  /* pot: bob + servings-based size + plop pulse when an ingredient lands */
  T3.plop=Math.max(0,T3.plop-dt*4);
  T3.potS=lerp(T3.potS,T3.potTarget,Math.min(1,dt*4));
  T3.pot.scale.setScalar(T3.potS*(1+T3.plop*0.06));
  T3.pot.position.y=0.40+Math.sin(G.time*5.2)*0.006+T3.punch*0.05+T3.plop*0.03;
  const dryN=fb.key==='buldak'||fb.key==='jjapa'||fb.key==='jjaguri';   /* 볶음면 — 국물 없이 소스만 */
  T3.noodles.position.y=Math.sin(G.time*4.1)*0.012+(dryN?0.022:0);
  T3.noodles.rotation.y+=dt*0.25;
  /* noodle strands & toppings pop in */
  for(const n of T3.noodleTubes){
    const s=lerp(n.scale.x,n.userData.tgt,Math.min(1,dt*8));
    n.scale.setScalar(s);
  }
  for(const k in T3.tops){
    const g=T3.tops[k];
    g.scale.setScalar(lerp(g.scale.x,g.userData.tgt,Math.min(1,dt*7)));
  }
  /* broth: color shift + slow swirl (볶음면은 낮게 깔린 소스로) */
  T3.broth.rotation.z+=dt*(0.25+T3.punch*1.5);
  T3.broth.position.y=lerp(T3.broth.position.y,dryN?0.303:0.345,Math.min(1,dt*3));
  const bsc=lerp(T3.broth.scale.x,dryN?0.85:1,Math.min(1,dt*3));
  T3.broth.scale.setScalar(bsc);
  T3.brothMat.roughness=dryN?0.34:0.07;
  T3.brothMat.clearcoat=dryN?0.25:1;
  T3.brothMat.color.lerp(new THREE.Color(fb.broth),0.05);
  T3.brothMat.emissiveIntensity=(fb.key==='jjapa'?0.1:0.35)+T3.punch*1.3+(G.fever?0.3+0.18*Math.sin(G.time*9):0);
  /* noodles pick up the sauce — dark for jjapa, red-tinged for buldak */
  T3.noodleMat.color.lerp(new THREE.Color(fb.key==='jjapa'?0x6E4419:fb.key==='jjaguri'?0x8A5A24:fb.key==='buldak'?0xE88A38:0xF6D468),0.05);
  /* induction heat — the LP visibly glows under the pot */
  const heat=(G.state==='game'?1:0.2)*(0.55+Math.min(0.45,G.combo*0.02));
  const hb=0.5+0.5*Math.sin(G.time*7);
  T3.heatRing.material.opacity=heat*(0.14+0.24*hb)+T3.punch*0.35;
  T3.heatRing.scale.setScalar(Math.min(T3.potS,0.95)*(1+0.04*hb));
  T3.heatLight.intensity=heat*(0.7+0.9*hb)+T3.punch*2.2;
  /* play button ring lights up white on press */
  const pp=clamp(1-(G.time-(G.padPress.play||-9))*4,0,1);
  T3.playRing.material.opacity=0.4+0.6*pp;
  T3.playRing.scale.setScalar(1+pp*0.15);
  T3.playGlow.material.opacity=pp*0.75;
  /* bubbles */
  for(const b of T3.bubbles){
    b.visible=!dryN;                                   /* 볶음면은 끓는 기포 없음 */
    const u=b.userData; u.ph+=dt*u.sp*(1+G.combo*0.02+T3.punch);
    const p=(Math.sin(u.ph)+1)/2;
    b.position.y=0.35+p*0.05; b.scale.setScalar(0.6+p*0.8);
    b.material.opacity=0.35+p*0.4;
  }
  /* steam — thicker with combo, bursts on drop */
  const inten=(G.state==='game'?0.55:0.3)+Math.min(0.8,G.combo*0.03)+T3.burst*1.3;
  T3.steam.forEach((sp,i)=>{
    const u=sp.userData;
    u.ph+=dt*(0.22+i%3*0.05)*(1+T3.burst*1.6);
    if(u.ph>1){ u.ph=0; u.x=rand(-0.3,0.3); u.z=rand(-0.3,0.3); }
    const p=u.ph;
    sp.position.set((u.x||0)+Math.sin(p*7+i)*0.16, -1.15+0.9+p*2.1, (u.z||0)+Math.cos(p*5+i)*0.1);
    const s=0.35+p*1.5+T3.burst*0.4;
    sp.scale.set(s,s,1);
    sp.material.opacity=Math.sin(p*Math.PI)*0.34*inten;
  });
  /* --- the famous-shop line: 3D chibi customers waiting --- */
  if(T3.qSlots){
    const want=[];
    if(G.state==='game'){
      const seen=new Set();
      for(let i=G.noteIdx;i<G.notes.length&&want.length<3;i++){
        const o=G.notes[i].order;
        if(!seen.has(o.no)){ seen.add(o.no); want.push(o.customer); }
      }
      const extra=Math.min(3,Math.max(0,((G.orderCount-2)/3)|0));
      const EX=['jay','tay','em','lisa','posty','bey','nigo','phril'];
      for(let k=0;k<extra;k++) want.push(EX[(k*2+1)%EX.length]);
    }
    T3.qSlots.forEach((sl,i)=>{
      const ty=want[i]||null;
      if(ty!==sl.type){
        if(sl.grp){ T3.root.remove(sl.grp); sl.grp=null; }
        if(ty){
          sl.grp=(T3.chibiCache[ty]||(T3.chibiCache[ty]=mkChibi(ty))).clone();
          sl.grp.position.set(-1.68-0.2*i,0,0.75-0.55*i);
          sl.grp.rotation.y=0.55;
          sl.grp.scale.setScalar(0.92);
          T3.root.add(sl.grp);
        }
        sl.type=ty;
      }
      if(sl.grp) sl.grp.position.y = i===0
        ? Math.abs(Math.sin(G.time*3.2))*0.06        /* front of the line can't wait */
        : Math.sin(G.time*1.8+i*1.7)*0.015+0.015;
    });
  }
  /* flavor light */
  T3.flavorLight.color.set((G.fever||dropOn)
    ? `hsl(${(G.time*(dropOn?340:140))%360},95%,60%)` : fb.color);
  T3.flavorLight.intensity=1.6+T3.punch*3.4+(G.fever?0.8:0)+(dropOn?1.8:0);
  T3.playRing.material.color.set(G.fever?0xffd9a8:0xffffff);
  /* LED */
  if(G.state==='attract') setLED('ON');
  else if(G.state==='over') setLED('GAME OVER');
  else setLED(G.fever?'FEVER!!':FLAVORS[bgFlavor()].label);
  /* camera */
  const cam=T3.camera;
  const shk=T3.shake3*0.06;
  if(G.state==='attract'){
    const a=Math.sin(G.time*0.25)*0.45;
    cam.position.set(Math.sin(a)*0.9,2.9+Math.sin(G.time*0.4)*0.1,8.2);
    cam.lookAt(0,-0.55,0);
  }else{
    const dz=dropOn?0.6+Math.sin(G.time*10.5)*0.12:0;   /* drop: punch in & pulse to the beat */
    cam.position.set(
      Math.sin(G.time*0.3)*0.12+rand(-shk,shk),
      3.0+Math.sin(G.time*0.8)*0.05+rand(-shk,shk),
      8.8-T3.punch*0.35-dz);
    cam.lookAt(0.15,-0.15+T3.punch*0.05,0);
  }
  T3.renderer.render(T3.scene,T3.camera);
}

/* =========================================================
   2D DRAW HELPERS
   ========================================================= */
function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}
function txt(str,x,y,size,color,align='center',font=F_SANS,weight='800'){
  ctx.font=`${weight} ${size}px ${font}`;
  ctx.fillStyle=color; ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.fillText(str,x,y);
}
function txtO(str,x,y,size,fill,stroke,lw,align='center',font=F_DISP){
  ctx.font=`${size}px ${font}`;
  ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.lineJoin='round'; ctx.strokeStyle=stroke; ctx.lineWidth=lw;
  ctx.strokeText(str,x,y); ctx.fillStyle=fill; ctx.fillText(str,x,y);
}
/* DJ Ramyun oval badge (gold ring · red ring · cream field · red bubble letters) */
function drawLogoBadge(c,cx,cy,w){
  const h=w*0.69, rx=w/2, ry=h/2;
  c.save(); c.translate(cx,cy);
  c.textAlign='center'; c.textBaseline='middle'; c.lineJoin='round';
  const oval=(sx,sy)=>{ c.beginPath(); c.ellipse(0,0,sx,sy,0,0,7); };
  /* soft drop shadow */
  c.save(); c.shadowColor='rgba(0,0,0,0.35)'; c.shadowBlur=w*0.04; c.shadowOffsetY=w*0.012;
  c.fillStyle='#FBF7EE'; oval(rx,ry); c.fill(); c.restore();
  /* gold outer ring */
  c.strokeStyle='#E8A83E'; c.lineWidth=w*0.05; oval(rx-w*0.028,ry-w*0.028); c.stroke();
  /* red inner ring */
  c.strokeStyle='#CE3A22'; c.lineWidth=w*0.028; oval(rx-w*0.088,ry-w*0.088); c.stroke();
  /* bubble lettering — auto-fit to the cream field so nothing overflows the rings */
  const word=(t,y,s,maxW,tr)=>{
    c.letterSpacing=(tr||0)+'px';
    c.font=`${s}px ${F_DISP}`;
    const tw=c.measureText(t).width+s*0.30;      // include outline thickness
    if(tw>maxW) s*=maxW/tw, c.font=`${s}px ${F_DISP}`;
    c.strokeStyle='#E8A83E'; c.lineWidth=s*0.30; c.strokeText(t,s*0.03,y+s*0.04);   // gold under-shadow
    c.strokeStyle='#FBF7EE'; c.lineWidth=s*0.20; c.strokeText(t,0,y);                // cream outline
    c.fillStyle='#CE3A22';   c.fillText(t,0,y);                                       // red fill
    c.letterSpacing='0px';
  };
  word('DJ',      -h*0.205, w*0.27, w*0.5);
  word('Ramyun',   h*0.205, w*0.288, w*0.84, -w*0.008);   // +20% larger, tighter tracking
  c.restore();
}
function ledTxt(str,x,y,size,align='left'){
  ctx.save();
  ctx.font=`${size}px ${F_ARCADE}`; ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.shadowColor='#ffab2e'; ctx.shadowBlur=size*0.7;
  ctx.fillStyle='#ffc95e'; ctx.fillText(str,x,y);
  ctx.shadowBlur=0; ctx.fillStyle='rgba(255,248,230,0.9)'; ctx.fillText(str,x,y);
  ctx.restore();
}
/* ---------- 공식 flavor 아이콘 (1.ai에서 추출) — 어떤 색으로든 틴트 ---------- */
const ICON={}, ICON_TINT={};
{ let pend=4;
  ['ramyun','buldak','jjapa','neogury'].forEach(k=>{
    const im=new Image();
    im.onload=()=>{ if(--pend===0 && T3.iconsRedraw) T3.iconsRedraw(); };
    im.src='art/icon_'+k+'.png';
    ICON[k]=im;
  });
}
function iconTint(k,color){
  const ck=k+'|'+color; let cv=ICON_TINT[ck];
  if(!cv){
    const im=ICON[k];
    cv=document.createElement('canvas'); cv.width=im.naturalWidth; cv.height=im.naturalHeight;
    const g=cv.getContext('2d'); g.drawImage(im,0,0);
    g.globalCompositeOperation='source-in'; g.fillStyle=color; g.fillRect(0,0,cv.width,cv.height);
    ICON_TINT[ck]=cv;
  }
  return cv;
}

/* SVG 타이포와 같은 무드의 코믹 레터링 — 글자별 지터 + 두꺼운 아웃라인 */
const F_COMIC="'Bangers', 'Arial Black', sans-serif";
function comicText(str,x,y,size,fill,outline='#241505',align='center'){
  ctx.save();
  ctx.font=`${size}px ${F_COMIC}`;
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.lineJoin='round'; ctx.lineCap='round';
  const chs=[...str];
  const ws=chs.map(ch=>ctx.measureText(ch).width);
  const total=ws.reduce((a,b)=>a+b,0)+(chs.length-1)*size*0.03;
  let cx0=align==='center'?x-total/2:align==='right'?x-total:x;
  const lw=size*0.14;
  chs.forEach((ch,i)=>{
    const jy=((i*7)%3-1)*size*0.055, ja=(((i*13)%5)-2)*0.028;
    ctx.save(); ctx.translate(cx0+ws[i]/2,y+jy); ctx.rotate(ja);
    ctx.strokeStyle='rgba(20,10,2,0.55)'; ctx.lineWidth=lw;
    ctx.strokeText(ch,-ws[i]/2+size*0.045,size*0.05);   /* 오프셋 섀도 */
    ctx.strokeStyle=outline; ctx.lineWidth=lw;
    ctx.strokeText(ch,-ws[i]/2,0);
    ctx.fillStyle=fill; ctx.fillText(ch,-ws[i]/2,0);
    ctx.restore();
    cx0+=ws[i]+size*0.03;
  });
  ctx.restore();
}
function steamIcon(c,x,y,s,color,lw,flavor){
  /* 공식 아이콘이 로드되면 그걸로 (짜파구리 혼합만 절차식 유지) */
  const ik=flavor&&flavor!=='jjaguri'?flavor:null;
  if(ik&&ICON[ik]&&ICON[ik].complete&&ICON[ik].naturalWidth){
    const cv=iconTint(ik,color);
    const h=s*2.0, w=h*(cv.width/cv.height);
    c.drawImage(cv,x-w/2,y-h*0.56,w,h);
    return;
  }
  c.save();
  c.strokeStyle=color; c.fillStyle=color; c.lineWidth=lw||s*0.22; c.lineCap='round'; c.lineJoin='round';
  for(let i=-1;i<=1;i++){
    const xx=x+i*s*0.42;
    c.beginPath();
    c.moveTo(xx,y+s*0.5);
    c.bezierCurveTo(xx-s*0.28,y+s*0.15,xx+s*0.28,y-s*0.15,xx,y-s*0.5);
    c.stroke();
  }
  /* flavor toppers — straight from the product icon sheet */
  if(flavor==='neogury'){            /* raccoon ears on the outer strands */
    for(const i of[-1,1]){ const xx=x+i*s*0.42;
      c.beginPath();
      c.moveTo(xx-i*s*0.1,y-s*0.4);
      c.quadraticCurveTo(xx+i*s*0.28,y-s*1.02,xx+i*s*0.46,y-s*0.52);
      c.quadraticCurveTo(xx+i*s*0.25,y-s*0.52,xx-i*s*0.02,y-s*0.56);
      c.closePath(); c.fill(); }
  }else if(flavor==='jjapa'){        /* black-bean cloud dripping down */
    c.beginPath(); c.ellipse(x-s*0.12,y-s*0.85,s*0.5,s*0.25,-0.12,0,7); c.fill();
    c.beginPath(); c.ellipse(x+s*0.4,y-s*0.72,s*0.24,s*0.16,0.2,0,7); c.fill();
    c.lineWidth=(lw||s*0.22)*0.7;
    for(let k=-1;k<=1;k++){ c.beginPath();
      c.moveTo(x+k*s*0.24-s*0.02,y-s*0.7); c.lineTo(x+k*s*0.24-s*0.12,y-s*0.42); c.stroke(); }
  }else if(flavor==='buldak'){       /* flame licking the top strand */
    c.beginPath();
    c.moveTo(x+s*0.02,y-s*0.48);
    c.bezierCurveTo(x+s*0.06,y-s*0.95,x+s*0.5,y-s*1.06,x+s*0.58,y-s*0.74);
    c.bezierCurveTo(x+s*0.84,y-s*0.78,x+s*0.78,y-s*0.4,x+s*0.52,y-s*0.42);
    c.quadraticCurveTo(x+s*0.28,y-s*0.54,x+s*0.02,y-s*0.48);
    c.closePath(); c.fill();
  }
  c.restore();
}
function heart(x,y,s,fill,glow){
  ctx.save();
  if(glow){ ctx.shadowColor=fill; ctx.shadowBlur=s*0.6; }
  ctx.fillStyle=fill; ctx.beginPath();
  ctx.moveTo(x,y+s*0.32);
  ctx.bezierCurveTo(x-s*0.5,y-s*0.28,x-s*0.16,y-s*0.62,x,y-s*0.24);
  ctx.bezierCurveTo(x+s*0.16,y-s*0.62,x+s*0.5,y-s*0.28,x,y+s*0.32);
  ctx.fill(); ctx.restore();
}
function starP(x,y,s,rot=0){
  ctx.beginPath();
  for(let i=0;i<10;i++){ const a=rot-Math.PI/2+i*Math.PI/5, rs=i%2?s*0.45:s;
    const px=x+Math.cos(a)*rs, py=y+Math.sin(a)*rs;
    i?ctx.lineTo(px,py):ctx.moveTo(px,py); }
  ctx.closePath();
}
const bezP=(x0,y0,x1,y1,x2,y2,x3,y3,u)=>{const v=1-u;return{
  x:v*v*v*x0+3*v*v*u*x1+3*v*u*u*x2+u*u*u*x3,
  y:v*v*v*y0+3*v*v*u*y1+3*v*u*u*y2+u*u*u*y3};};

/* =========================================================
   CUSTOMERS — 2D faces for toasts & the slurp vignette
   street-hip cast · mood: 'idle'|'slurp'|'yum'|'happy'|'sad'
   ========================================================= */
function drawCust(x,y,r,type,t,mood='idle'){
  const skin=CUST_SKIN[type]||'#8A5A3B', dark='#14100C';
  const lw=Math.max(1.4,r*0.07);
  ctx.save(); ctx.translate(x,y);
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.strokeStyle=dark; ctx.lineWidth=lw;

  /* ---- behind the face: long hair / braids ---- */
  if(type==='bey'||type==='nicki'||type==='lisa'||type==='tay'){
    ctx.fillStyle=type==='bey'?'#D9A44A':type==='lisa'?'#241A12':type==='tay'?'#E8C86A':'#F06CA8';
    ctx.beginPath(); ctx.ellipse(0,-r*0.2,r*1.16,r*1.02,0,0,7); ctx.fill(); ctx.stroke();
    for(const s of[-1,1]){ ctx.beginPath(); ctx.ellipse(s*r*0.82,r*0.5,r*0.32,r*0.72,s*0.12,0,7); ctx.fill(); ctx.stroke(); }
  }
  if(type==='trav') for(let i=0;i<7;i++){          /* braids all around */
    const a=Math.PI*(0.05+i*0.15);
    ctx.fillStyle='#1B1410';
    ctx.save(); ctx.translate(Math.cos(a)*r*0.86,-Math.sin(a)*r*0.62); ctx.rotate((Math.PI/2-a)*0.5);
    ctx.beginPath(); ctx.ellipse(0,r*0.3,r*0.11,r*0.4,0,0,7); ctx.fill(); ctx.restore();
  }
  if(type==='snoop') for(const s of[-1,1]){        /* thin side braids */
    ctx.fillStyle='#171310';
    ctx.beginPath(); ctx.ellipse(s*r*0.74,r*0.32,r*0.14,r*0.58,s*0.18,0,7); ctx.fill();
  }

  /* ---- face ---- */
  ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill(); ctx.stroke();

  /* ---- hair & hats over the face ---- */
  if(type==='trav'){ ctx.fillStyle='#1B1410';      /* braid crown */
    ctx.beginPath(); ctx.arc(0,-r*0.4,r*0.82,Math.PI*1.02,Math.PI*1.98); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  if(type==='carti'||type==='billie'||type==='posty'){ ctx.fillStyle=type==='billie'?'#1E5A48':type==='posty'?'#6B4B32':'#121212';   /* shag + spiky edges */
    ctx.beginPath(); ctx.arc(0,-r*0.38,r*0.84,Math.PI*1.0,Math.PI*2.0); ctx.closePath(); ctx.fill(); ctx.stroke();
    for(let i=-2;i<=2;i++){ ctx.beginPath();
      ctx.moveTo(i*r*0.3-r*0.1,-r*0.42); ctx.lineTo(i*r*0.3,-r*0.12); ctx.lineTo(i*r*0.3+r*0.1,-r*0.42);
      ctx.closePath(); ctx.fill(); } }
  if(type==='jay'){ ctx.fillStyle='#1E2E4E';       /* fitted cap */
    ctx.beginPath(); ctx.arc(0,-r*0.4,r*0.8,Math.PI,0); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#16233C'; rr(ctx,-r*1.12,-r*0.52,r*1.1,r*0.22,r*0.11); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#EDEDE6'; ctx.beginPath(); ctx.arc(0,-r*0.66,r*0.12,0,7); ctx.fill(); }
  if(type==='ye'||type==='em'||type==='psy'||type==='nigo'){ ctx.fillStyle=type==='em'?'#D8B24A':'#181210';   /* buzz / flat cut */
    ctx.beginPath(); ctx.arc(0,-r*0.34,r*0.86,Math.PI*1.04,Math.PI*1.96); ctx.closePath(); ctx.fill(); }
  if(type==='bey'){ ctx.fillStyle='#D9A44A';       /* golden waves front */
    ctx.beginPath(); ctx.arc(0,-r*0.42,r*0.78,Math.PI*0.96,Math.PI*2.04); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  if(type==='nicki'){ ctx.fillStyle='#F06CA8';
    ctx.beginPath(); ctx.arc(0,-r*0.42,r*0.78,Math.PI*0.96,Math.PI*2.04); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  if(type==='lisa'||type==='tay'){ ctx.fillStyle=type==='tay'?'#E8C86A':'#241A12';   /* full bangs */
    ctx.beginPath(); ctx.arc(0,-r*0.36,r*0.82,Math.PI*0.92,Math.PI*2.08); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  if(type==='phril'){                              /* big ranger hat */
    ctx.fillStyle='#6E4C2E';
    ctx.beginPath(); ctx.ellipse(0,-r*0.62,r*1.25,r*0.3,0,0,7); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,-r*0.66,r*0.62,Math.PI,0); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  if(type==='snoop'){ ctx.fillStyle='#171310';
    ctx.beginPath(); ctx.arc(0,-r*0.42,r*0.78,Math.PI*1.02,Math.PI*1.98); ctx.closePath(); ctx.fill(); }

  /* ---- eyes / shades ---- */
  const ex=r*0.38, ey=-r*0.08;
  const shades=type==='ye'?'shutter':(type==='snoop'||type==='psy')?'slim':null;
  ctx.strokeStyle=dark; ctx.fillStyle=dark;
  if(shades){
    ctx.fillStyle='#101014';
    const sh=shades==='shutter'?r*0.34:r*0.22;
    rr(ctx,-r*0.68,ey-sh/2,r*1.36,sh,sh*0.3); ctx.fill();
    if(shades==='shutter'){ ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=lw*0.5;
      for(let k=-1;k<=1;k++){ ctx.beginPath(); ctx.moveTo(-r*0.62,ey+k*sh*0.26); ctx.lineTo(r*0.62,ey+k*sh*0.26); ctx.stroke(); } }
    if(mood==='happy') for(const s of[-1,1]) heart(s*ex,ey,r*0.22,'#FF4D63',true);
    ctx.strokeStyle=dark; ctx.lineWidth=lw;
  }else if(mood==='slurp'||mood==='yum'){
    ctx.lineWidth=lw*1.25;
    for(const s of[-1,1]){ ctx.beginPath(); ctx.arc(s*ex,ey+r*0.08,r*0.15,Math.PI*1.12,Math.PI*1.88); ctx.stroke(); }
  }else if(mood==='happy'){
    for(const s of[-1,1]) heart(s*ex,ey+r*0.02,r*0.32,'#FF4D63',true);
  }else if(mood==='sad'){
    ctx.lineWidth=lw*1.25;
    for(const s of[-1,1]){ ctx.beginPath(); ctx.moveTo(s*ex-s*r*0.13,ey-r*0.06); ctx.lineTo(s*ex+s*r*0.13,ey+r*0.04); ctx.stroke(); }
    ctx.fillStyle='#8FD0EC'; ctx.beginPath();
    ctx.ellipse(ex+r*0.16,ey+r*0.24+((t*1.4)%1)*r*0.16,r*0.06,r*0.09,0,0,7); ctx.fill();
  }else{                                           /* idle: chill half-lid eyes */
    if(((t+type.length*0.77)%3.4)<0.12){ ctx.lineWidth=lw*1.25;
      for(const s of[-1,1]){ ctx.beginPath(); ctx.moveTo(s*ex-r*0.12,ey+r*0.02); ctx.lineTo(s*ex+r*0.12,ey+r*0.02); ctx.stroke(); }
    }else for(const s of[-1,1]){
      ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(s*ex,ey,r*0.12,r*0.14,0,0,7); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s*ex+r*0.045,ey-r*0.045,r*0.045,0,7); ctx.fill();
    }
  }

  /* ---- brows (attitude) ---- */
  if(!shades&&mood!=='sad'&&(type==='trav'||type==='carti'||type==='jay'||type==='em'||type==='nigo')){
    ctx.strokeStyle=dark; ctx.lineWidth=lw*1.2;
    for(const s of[-1,1]){ ctx.beginPath(); ctx.moveTo(s*r*0.2,-r*0.34); ctx.lineTo(s*r*0.54,-r*0.4); ctx.stroke(); }
  }

  /* ---- mouth ---- */
  ctx.strokeStyle=dark; ctx.fillStyle=dark; ctx.lineWidth=lw*1.1;
  const my=r*0.4;
  if(mood==='happy'||mood==='yum'){
    ctx.fillStyle='#5E1F16'; ctx.beginPath();
    ctx.moveTo(-r*0.3,my-r*0.08); ctx.quadraticCurveTo(0,my+r*0.34,r*0.3,my-r*0.08);
    ctx.quadraticCurveTo(0,my+r*0.06,-r*0.3,my-r*0.08); ctx.fill();
    ctx.fillStyle='#F2C14E';                       /* grill flash */
    ctx.beginPath(); ctx.ellipse(0,my+r*0.02,r*0.16,r*0.045,0,0,7); ctx.fill();
  }else if(mood==='sad'){ ctx.beginPath(); ctx.arc(0,my+r*0.16,r*0.16,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
  }else if(mood==='idle'){ ctx.beginPath(); ctx.moveTo(-r*0.13,my); ctx.lineTo(r*0.13,my-r*0.03); ctx.stroke(); }

  /* ---- ice: chain + hoops ---- */
  if(type==='trav'||type==='carti'||type==='jay'||type==='em'||type==='nigo'||type==='posty'){
    ctx.strokeStyle='#F2C14E'; ctx.lineWidth=lw*1.15;
    ctx.beginPath(); ctx.arc(0,r*0.5,r*0.66,Math.PI*0.18,Math.PI*0.82); ctx.stroke();
    ctx.fillStyle='#F2C14E'; ctx.beginPath(); ctx.arc(0,r*1.18,r*0.1,0,7); ctx.fill();
    ctx.strokeStyle=dark; ctx.lineWidth=lw;
  }
  if(type==='bey'||type==='nicki'||type==='lisa'||type==='tay'){ ctx.strokeStyle='#F2C14E'; ctx.lineWidth=lw*1.1;
    for(const s of[-1,1]){ ctx.beginPath(); ctx.arc(s*r*0.92,r*0.38,r*0.13,0,7); ctx.stroke(); }
    ctx.strokeStyle=dark; ctx.lineWidth=lw; }
  if(type==='jay'||type==='posty'){ ctx.strokeStyle=type==='posty'?'#5A3E28':'#171310'; ctx.lineWidth=lw*2.1;   /* beard line */
    ctx.beginPath(); ctx.arc(0,r*0.06,r*0.8,Math.PI*0.22,Math.PI*0.78); ctx.stroke();
    ctx.strokeStyle=dark; ctx.lineWidth=lw; }
  if(type==='nigo'){ ctx.fillStyle='#171310';       /* goatee */
    ctx.beginPath(); ctx.ellipse(0,r*0.62,r*0.1,r*0.07,0,0,7); ctx.fill(); }
  ctx.restore();
}

/* =========================================================
   MASCOTS v2 — faithful to the character sheet
   ========================================================= */
function drawMascot(x,y,s,fk,mood,t){
  const aim=ART['m_'+(fk==='jjaguri'?'neogury':fk)];
  if(aim){
    let dy=0,dx=0;
    if(mood==='dance'){ dy=-Math.abs(Math.sin(t*7))*s*0.16; dx=Math.sin(t*3.5)*s*0.04; }
    else if(mood==='idle'){ dy=Math.sin(t*2.1)*s*0.025; }
    else if(mood==='shock'){ dx=Math.sin(t*42)*s*0.05; }
    else if(mood==='eat'){ dy=Math.sin(t*9)*s*0.03; }
    ctx.save(); ctx.translate(x+dx,y+dy-s*0.35);
    if(mood==='dance') ctx.rotate(Math.sin(t*3.5)*0.07);
    const h=s*3.1, w=h*(aim.width/aim.height);
    ctx.drawImage(aim,-w/2,-h/2,w,h);
    ctx.restore();
    return;
  }
  const F=FLAVORS[fk];
  const u=s/5;
  let dy=0,dx=0,open=false;
  if(mood==='dance'){ dy=-Math.abs(Math.sin(t*7))*s*0.16; dx=Math.sin(t*3.5)*s*0.04; open=true; }
  else if(mood==='idle'){ dy=Math.sin(t*2.1)*s*0.025; }
  else if(mood==='shock'){ dx=Math.sin(t*42)*s*0.05; }
  else if(mood==='eat'){ dy=Math.sin(t*9)*s*0.03; open=true; }
  ctx.save(); ctx.translate(x+dx,y+dy);
  const top=-s;
  /* strands */
  ctx.lineCap='round'; ctx.strokeStyle=F.color; ctx.lineWidth=u*1.5;
  for(let i=-1;i<=1;i++){
    const x0=i*u*1.3;
    const amp=(u*0.72+Math.sin(t*2.6+i*1.9)*u*0.2)*(i===0?-1:1);
    const yTop=top+(i===0?u*0.1:u*0.55);
    ctx.beginPath();
    ctx.moveTo(x0-amp*0.5,yTop+u*0.6);
    ctx.bezierCurveTo(x0+amp,top+s*0.34,x0-amp,top+s*0.62,x0+amp*0.55,-u*0.8);
    ctx.stroke();
  }
  const ey=top+s*0.42, es=u*0.92;
  /* headphones */
  ctx.strokeStyle='#151210'; ctx.lineWidth=u*0.5;
  ctx.beginPath(); ctx.arc(0,ey+u*0.15,u*2.7,Math.PI*1.1,Math.PI*1.9); ctx.stroke();
  ctx.fillStyle='#151210';
  ctx.beginPath(); ctx.arc(-u*2.6,ey+u*0.55,u*0.95,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc( u*2.6,ey+u*0.55,u*0.95,0,7); ctx.fill();
  /* eyes per character */
  const blink=mood!=='shock'&&((t+x*0.01)%3.4)<0.12;
  function pupil(sx){ ctx.fillStyle='#151210'; ctx.beginPath(); ctx.ellipse(sx,ey+es*0.16,es*0.32,es*0.4,0,0,7); ctx.fill(); }
  if(mood==='shock'){
    for(const sg of[-1,1]){
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sg*u,ey,es*0.85,0,7); ctx.fill();
      ctx.fillStyle='#151210'; ctx.beginPath(); ctx.arc(sg*u,ey,es*0.36,0,7); ctx.fill(); }
  }else if(fk==='ramyun'){
    ctx.fillStyle='#151210';
    for(const sg of[-1,1]){ ctx.beginPath();
      ctx.ellipse(sg*u,ey,es*0.42,blink?es*0.07:es*0.68,0,0,7); ctx.fill(); }
  }else if(fk==='jjapa'){
    for(const sg of[-1,1]){
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sg*u,ey,es*0.62,0,7); ctx.fill();
      pupil(sg*u);
      ctx.fillStyle=F.color; ctx.beginPath();
      ctx.ellipse(sg*u,ey-es*0.42,es*0.66,es*0.4,0,Math.PI,0); ctx.fill();
      ctx.strokeStyle='#151210'; ctx.lineWidth=u*0.26; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(sg*u,ey-es*0.62,es*0.5,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
    }
  }else if(fk==='buldak'){
    for(const sg of[-1,1]){
      ctx.save(); ctx.translate(sg*u,ey); ctx.rotate(sg*0.3);
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(0,0,es*0.62,es*0.34,0,0,7); ctx.fill();
      ctx.fillStyle='#151210'; ctx.beginPath(); ctx.arc(sg*es*0.15,es*0.05,es*0.22,0,7); ctx.fill();
      ctx.restore();
    }
  }else{ /* neogury — sleepy half-lidded */
    for(const sg of[-1,1]){
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sg*u,ey,es*0.58,0,7); ctx.fill();
      pupil(sg*u);
      ctx.fillStyle=F.color; ctx.fillRect(sg*u-es*0.62,ey-es*0.62,es*1.24,es*0.5);
    }
  }
  /* mouth */
  if(mood==='shock'){ ctx.strokeStyle='#151210'; ctx.lineWidth=u*0.34;
    ctx.beginPath(); ctx.arc(0,ey+u*1.8,u*0.6,0,7); ctx.stroke(); }
  else if(open){ ctx.fillStyle='#151210';
    ctx.beginPath(); ctx.ellipse(0,ey+u*1.8,u*0.6,u*0.72,0,0,7); ctx.fill();
    ctx.fillStyle='#e86a5e'; ctx.beginPath(); ctx.ellipse(0,ey+u*2.05,u*0.32,u*0.3,0,0,7); ctx.fill(); }
  /* accessories */
  if(fk==='ramyun'){
    ctx.fillStyle='#f3efe6';
    ctx.beginPath(); ctx.ellipse(u*0.15,top+u*0.12,u*2.15,u*1.3,-0.1,Math.PI,0); ctx.fill();
    ctx.fillStyle='#e0301e';
    ctx.beginPath(); ctx.ellipse(-u*2.05,top+u*0.42,u*1.4,u*0.44,-0.3,0,7); ctx.fill();
    ctx.fillStyle='#e0301e'; ctx.beginPath(); ctx.arc(u*0.15,top-u*1.0,u*0.3,0,7); ctx.fill();
  }else if(fk==='buldak'){
    ctx.fillStyle='#e0301e';
    ctx.beginPath(); ctx.arc(-u*0.75,top-u*0.15,u*0.55,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(0,top-u*0.75,u*0.68,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(u*0.75,top-u*0.15,u*0.55,0,7); ctx.fill();
    ctx.beginPath(); ctx.roundRect(-u*0.3,top-u*0.2,u*0.6,u*0.9,u*0.2); ctx.fill();
  }else if(fk==='jjapa'){
    ctx.fillStyle='#f6f3ec';
    ctx.beginPath(); ctx.arc(-u*1.15,top-u*0.35,u*0.9,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(0,top-u*0.9,u*1.02,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(u*1.15,top-u*0.35,u*0.9,0,7); ctx.fill();
    ctx.fillRect(-u*1.7,top-u*0.3,u*3.4,u*1.05);
  }else{ /* neo ears + mic */
    for(const sg of[-1,1]){
      ctx.fillStyle=F.color;
      ctx.beginPath();
      ctx.moveTo(sg*u*0.5,top+u*0.75);
      ctx.quadraticCurveTo(sg*u*1.6,top-u*1.6,sg*u*2.35,top-u*1.1);
      ctx.quadraticCurveTo(sg*u*2.7,top+u*0.4,sg*u*1.9,top+u*1.1);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#4a3527';
      ctx.beginPath();
      ctx.moveTo(sg*u*1.55,top-u*0.75);
      ctx.quadraticCurveTo(sg*u*2.05,top-u*1.45,sg*u*2.35,top-u*1.1);
      ctx.quadraticCurveTo(sg*u*2.5,top-u*0.5,sg*u*2.2,top-u*0.15);
      ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle='#151210'; ctx.lineWidth=u*0.32; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(u*2.6,ey+u*1.2);
    ctx.quadraticCurveTo(u*2.35,ey+u*2.5,u*0.95,ey+u*2.25); ctx.stroke();
    ctx.fillStyle='#151210'; ctx.beginPath(); ctx.arc(u*0.9,ey+u*2.2,u*0.44,0,7); ctx.fill();
  }
  ctx.restore();
}

/* =========================================================
   BACKGROUND (bg canvas, under the 3D layer)
   ========================================================= */
function bgFlavor(){
  const n=G.notes[Math.min(G.noteIdx,G.notes.length-1)];
  return n?(n.sec||n.flavor):'ramyun';
}
function drawBG(){
  bgX.setTransform(DPR,0,0,DPR,0,0);
  bgX.fillStyle='#0b0906'; bgX.fillRect(0,0,VW,VH);
  if(G.state==='attract'||G.state==='over'){
    const g=bgX.createRadialGradient(VW/2,SH*0.34,20,VW/2,SH*0.42,SH*0.7);
    g.addColorStop(0,'rgba(245,179,27,0.32)');
    g.addColorStop(0.6,'rgba(245,179,27,0.06)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle=g; bgX.fillRect(0,0,VW,VH);
    return;
  }
  const target=(G.time<G.drop)
    ? [200+55*Math.sin(G.time*6), 40+90*Math.abs(Math.sin(G.time*4.2)), 30+40*Math.abs(Math.sin(G.time*3.1))]
    : G.fever
    ? [205+50*Math.sin(G.time*1.4), 55+85*Math.abs(Math.sin(G.time*0.9)), 22]
    : hex2rgb(FLAVORS[bgFlavor()].color);
  G.bg=mixc(G.bg,target,0.05);
  const c=G.bg;
  bgX.save(); bgX.translate(SX,0);
  const g=bgX.createRadialGradient(SW*0.5,SH*0.3,SH*0.05,SW*0.5,SH*0.45,SH*0.8);
  g.addColorStop(0,rgbStr(mixc(c,[255,255,255],0.22)));
  g.addColorStop(0.55,rgbStr(c));
  g.addColorStop(1,rgbStr(mixc(c,[0,0,0],0.55)));
  bgX.fillStyle=g; bgX.fillRect(0,0,SW,SH);
  /* rotating light beams */
  bgX.save(); bgX.translate(SW/2,SH*0.14);
  for(let i=0;i<3;i++){
    bgX.save(); bgX.rotate(G.time*0.18+i*2.1);
    bgX.fillStyle='rgba(255,255,255,0.05)';
    bgX.beginPath(); bgX.moveTo(0,0); bgX.arc(0,0,SH*1.1,-0.16,0.16); bgX.closePath(); bgX.fill();
    bgX.restore();
  }
  bgX.restore();
  if(dotPat){ bgX.globalAlpha=0.08; bgX.fillStyle=dotPat; bgX.fillRect(0,0,SW,SH); bgX.globalAlpha=1; }
  /* vignette */
  const v=bgX.createRadialGradient(SW/2,SH/2,SH*0.35,SW/2,SH/2,SH*0.72);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.4)');
  bgX.fillStyle=v; bgX.fillRect(0,0,SW,SH);
  bgX.restore();
}

/* =========================================================
   UI RENDER — game
   ========================================================= */
function regions(){
  return { hudY:SH*0.055, orderY:SH*0.124, labelY:SH*0.175,
           railY:SH*0.265, judgeX:SW*0.28, comboY:SH*0.368,
           padY:SH*0.78, padH:SH*0.152 };
}
function pxPerBeat(){ return SW*0.27; }

function drawNoteDisc(x,y,n,dNear){
  const F=FLAVORS[n.flavor];
  const isPlay=n.type==='play';
  const r=(isPlay?SW*0.066:SW*0.052)*(1+dNear*0.12);
  ctx.save();
  /* shadow */
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x+2,y+r*0.55,r*0.9,r*0.35,0,0,7); ctx.fill();
  /* glow near judgment */
  if(dNear>0.25){ ctx.shadowColor=isPlay?'#ff3b1e':F.color; ctx.shadowBlur=16*dNear; }
  /* disc */
  ctx.fillStyle='#131110';
  ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  ctx.shadowBlur=0;
  /* grooves */
  ctx.strokeStyle='rgba(255,255,255,0.09)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x,y,r*0.8,0,7); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,r*0.65,0,7); ctx.stroke();
  /* outer ring */
  ctx.strokeStyle=isPlay?'#ff3b1e':F.color; ctx.lineWidth=isPlay?3.5:2.6;
  ctx.beginPath(); ctx.arc(x,y,r-1.6,0,7); ctx.stroke();
  /* label */
  ctx.fillStyle=isPlay?'#ff3b1e':F.color;
  ctx.beginPath(); ctx.arc(x,y,r*0.48,0,7); ctx.fill();
  if(isPlay){
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.moveTo(x-r*0.22,y-r*0.26); ctx.lineTo(x-r*0.22,y+r*0.26); ctx.lineTo(x+r*0.14,y); ctx.closePath(); ctx.fill();
    ctx.fillRect(x+r*0.2,y-r*0.24,r*0.11,r*0.48);
  }else{
    steamIcon(ctx,x,y,r*0.40,'rgba(255,255,255,0.95)',r*0.1,n.flavor);
  }
  /* gloss */
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.arc(x,y,r*0.86,-2.4,-1.2); ctx.stroke();
  ctx.restore();
}

function drawGame(){
  const R=regions();
  const spb=60/G.bpm;
  const nowT=pnow();
  const fbg=bgFlavor(), FL=FLAVORS[fbg];

  /* ---- HUD (LED style) ---- */
  ctx.fillStyle='rgba(10,7,4,0.45)';
  rr(ctx,SW*0.02,SH*0.02,SW*0.96,SH*0.076,SH*0.022); ctx.fill();
  ctx.font=`900 ${SW*0.027}px ${F_SANS}`; ctx.fillStyle='rgba(255,220,160,0.6)';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('SCORE',SW*0.05,R.hudY-SH*0.017);
  ledTxt(String(G.score).padStart(7,'0'),SW*0.05,R.hudY+SH*0.015,SW*0.049);
  ctx.font=`900 ${SW*0.027}px ${F_SANS}`; ctx.fillStyle='rgba(255,220,160,0.6)';
  ctx.textAlign='center'; ctx.fillText('ORDER',SW*0.57,R.hudY-SH*0.017);
  ledTxt('#'+String(G.curOrderNo).padStart(2,'0'),SW*0.57,R.hudY+SH*0.015,SW*0.042,'center');
  for(let i=0;i<3;i++)
    heart(SW*0.93-i*SW*0.078,R.hudY,SW*0.062,i<G.lives?'#ff2e3f':'rgba(255,255,255,0.13)',i<G.lives);

  /* ---- section label (right of the mascot lane) ---- */
  comicText(FL.label,SW*0.63,R.labelY+SH*0.012,SW*0.088,FL.color==='#8a5432'?'#c58c5a':FL.color);

  /* ---- rail ---- */
  ctx.fillStyle='rgba(10,6,2,0.35)';
  rr(ctx,-4,R.railY-SW*0.076,SW+8,SW*0.152,SW*0.072); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.16)'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(0,R.railY); ctx.lineTo(SW,R.railY); ctx.stroke();

  /* judgment ring */
  const beatFrac=A.ctx?clamp(1-(A.nextBeat-anow())/spb,0,1):(G.time%0.6)/0.6;
  const pulse=1+0.09*Math.max(0,1-beatFrac*2.5);
  const jr=SW*0.074*pulse;
  ctx.save();
  ctx.shadowColor='#fff'; ctx.shadowBlur=10;
  ctx.setLineDash([6,5]); ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=2.8;
  ctx.beginPath(); ctx.arc(R.judgeX,R.railY,jr,0,7); ctx.stroke();
  ctx.restore();

  /* notes */
  const ppb=pxPerBeat();
  for(let i=G.noteIdx;i<G.notes.length;i++){
    const n=G.notes[i];
    const x=R.judgeX+(n.time-nowT)/spb*ppb;
    if(x>SW+70) break;
    const dNear=clamp(1-Math.abs(x-R.judgeX)/(SW*0.3),0,1);
    drawNoteDisc(x,R.railY,n,dNear);
  }

  /* mascot at judgment line */
  drawMascot(R.judgeX,R.railY-jr-SH*0.002,SH*0.066,fbg,G.combo>=8?'dance':'idle',G.time);

  /* ---- combo (hidden for a beat while the slurp vignette plays) ---- */
  if(G.combo>=2 && !G.eat && !G.tut){
    const c2=G.combo, tier=c2>=100?4:c2>=50?3:c2>=25?2:c2>=10?1:0;
    const pop=1+0.35*Math.max(0,1-(G.time-G.comboT)*4);
    const col=tier===0?'#fff':tier===1?'#ffe95e':tier===2?'#ffb02e'
             :`hsl(${(G.time*(tier===4?420:240))%360},100%,65%)`;   /* 50+ 무지개 */
    ctx.save(); ctx.translate(SW*0.5,R.comboY); ctx.scale(pop,pop);
    if(tier>=3) ctx.rotate(Math.sin(G.time*9)*0.03);
    if(tier>=2){ ctx.shadowColor=tier>=3?col:'#ff9d1e'; ctx.shadowBlur=SW*(0.02+tier*0.008); }
    comicText(`COMBO ×${c2}`,0,0,SW*(0.058+tier*0.007),col);
    ctx.restore();
    if(tier>=3){                                    /* 콤보 주위 별 오라 (50+) */
      const nS=2+tier*2;
      for(let i=0;i<nS;i++){
        const a2=G.time*2.2+i*(6.283/nS);
        ctx.save(); ctx.globalAlpha=0.4+0.4*Math.sin(G.time*7+i*2);
        ctx.fillStyle=col;
        starP(SW*0.5+Math.cos(a2)*SW*0.21,R.comboY+Math.sin(a2)*SW*0.045,SW*0.011+tier*1.5,G.time+i);
        ctx.fill(); ctx.restore();
      }
    }
  }

  /* ---- 첫 판 튜토리얼: 연습 주문 가이드 ---- */
  if(G.tut){
    const tn=G.notes[G.noteIdx];
    if(tn&&tn.order.no===1){
      const msg=tn.type==='play'?'마지막은 오른쪽 ▶ PLAY 버튼!'
               :`원판이 점선 원에 닿는 순간, ${FLAVORS[tn.flavor].ko} 버튼 탭!`;
      ctx.save(); ctx.globalAlpha=0.8+0.2*Math.sin(G.time*5);
      ctx.fillStyle='rgba(12,8,4,0.82)';
      rr(ctx,SW*0.1,SH*0.325,SW*0.8,SH*0.062,SH*0.02); ctx.fill();
      ctx.strokeStyle='#ffe95e'; ctx.lineWidth=1.5;
      rr(ctx,SW*0.1+1,SH*0.325+1,SW*0.8-2,SH*0.062-2,SH*0.019); ctx.stroke();
      txt('👆 '+msg,SW*0.5,SH*0.347,SH*0.019,'#ffe95e','center',F_SANS,'800');
      txt('연습 주문 — 하트가 닳지 않아요!',SW*0.5,SH*0.372,SH*0.014,'rgba(255,255,255,0.65)');
      ctx.restore();
    }
  }

  /* ---- THE DROP overlay: beat-pulsing frame + title + ×3 badge ---- */
  if(G.time<G.drop){
    const dt2=G.time-G.dropT0;
    const beat=Math.abs(Math.sin(dt2*Math.PI*2.4));
    ctx.save();
    ctx.strokeStyle=`rgba(255,120,30,${0.28+0.45*beat})`;
    ctx.lineWidth=SW*0.016*beat+3;
    ctx.strokeRect(ctx.lineWidth/2,ctx.lineWidth/2,SW-ctx.lineWidth,SH-ctx.lineWidth);
    if(dt2<1.4){                                    /* title slam */
      const sc=dt2<0.25?easeOut(dt2/0.25)*1.35:1.35-easeOut((dt2-0.25)/0.3)*0.35;
      ctx.translate(SW/2,SH*0.565); ctx.scale(sc,sc); ctx.rotate(Math.sin(dt2*18)*0.02);
      if(!drawArt('t_banger',0,0,SW*0.66))
        txtO('🔥 THE DROP!! 🔥',0,0,SW*0.074,'#ffe95e','#7a1400',SW*0.017);
    }
    ctx.restore();
  }

  /* fallback 2D deck when three.js is unavailable */
  if(!T3.ok) draw2DDeckFallback(SW*0.5,SH*0.55,SW*0.7);

  /* ---- toasts + slurp vignette (the queue itself is 3D now) ---- */
  drawToasts();
  drawEat();

  /* ---- FX ---- */
  for(const f of G.fx){
    const t=G.time-f.t0;
    if(f.kind==='judge'){
      const cfg={perfect:['PERFECT!','#ffe95e',1.25],good:['GOOD','#9be564',1],bad:['BAD…','#bbb',0.8],miss:['MISS!!','#ff5040',1.3]}[f.j];
      const sc=cfg[2]*(1+0.4*Math.sin(Math.min(t*10,Math.PI)));
      ctx.save(); ctx.globalAlpha=1-easeIn(t/0.8);
      ctx.translate(f.x,f.y-t*14); ctx.scale(sc,sc);
      if(!(f.j==='miss'&&drawArt('t_kidding',0,0,SW*0.26))){
        const jc={perfect:'#FFF6D6',good:'#D9EFC0',bad:'#CFC8BE',miss:'#FF6B5A'}[f.j];
        if(f.j!=='perfect') ctx.globalAlpha*=0.7;
        comicText(cfg[0],0,0,SW*(f.j==='perfect'?0.046:0.036),jc);
      }
      ctx.restore();
    }else if(f.kind==='ring'){
      const r_=SW*(f.big?0.062:0.048)+t*SW*0.45*(f.pow||1);
      ctx.save(); ctx.globalAlpha=(1-t/0.8)*0.8;
      ctx.strokeStyle=f.color; ctx.lineWidth=4*(1-t/0.8)+1;
      ctx.beginPath(); ctx.arc(f.x,f.y,r_,0,7); ctx.stroke(); ctx.restore();
    }else if(f.kind==='spark'){
      const d=t*f.v;
      ctx.save(); ctx.globalAlpha=1-t/0.8;
      ctx.fillStyle=f.c;
      ctx.beginPath(); ctx.arc(f.x+Math.cos(f.a)*d,f.y+Math.sin(f.a)*d-t*t*120,2.6,0,7); ctx.fill();
      ctx.restore();
    }else if(f.kind==='banner'){
      const a=t<0.15?t/0.15:t>1.1?1-(t-1.1)/0.3:1;
      ctx.save(); ctx.globalAlpha=clamp(a,0,1);
      ctx.fillStyle='rgba(15,9,3,0.85)';
      rr(ctx,SW*0.24,SH*0.298,SW*0.52,SH*0.034,SH*0.017); ctx.fill();
      txt(f.text,SW*0.5,SH*0.315,SH*0.0155,'#ffe95e','center',F_SANS,'900');
      ctx.restore();
    }else if(f.kind==='drop'){
      const sc=1+0.5*Math.sin(Math.min(t*8,Math.PI));
      ctx.save(); ctx.globalAlpha=1-easeIn(t/0.8);
      ctx.translate(SW*0.5,SH*0.313); ctx.scale(sc,sc);
      const AK={ramyun:'t_egg',buldak:'t_onfire',jjapa:'t_sauce',neogury:'t_shots',jjaguri:'t_mix'};
      if(!drawArt(AK[f.flavor]||'t_egg',0,0,SW*0.42))
        txtO('DROP!',0,0,SW*0.078,FLAVORS[f.flavor].color,'#140c04',SW*0.017);
      ctx.restore();
    }else if(f.kind==='artslam'){
      if(G.time<G.drop && G.time-G.dropT0<1.5) continue;   /* 드랍 타이틀과 겹침 금지 */
      const sc2=t<0.18?easeOut(t/0.18)*1.25:1.25-easeOut((t-0.18)/0.5)*0.25;
      ctx.save(); ctx.globalAlpha=clamp(1-easeIn((t-0.95)/0.45),0,1);
      ctx.translate(SW/2,SH*0.425); ctx.scale(sc2,sc2); ctx.rotate(Math.sin(t*9)*0.03);
      drawArt(f.art,0,0,SW*0.5);
      ctx.restore();
    }else if(f.kind==='heartbreak'){
      const a=1-t/0.8;
      ctx.save(); ctx.globalAlpha=a;
      heart(SW*0.945,SH*0.05+t*SH*0.09,SW*0.05*(1+t),'#ff2e3f',false);
      ctx.restore();
    }
  }
  drawConfetti();

  /* ---- pads ---- */
  drawPads(R);

  /* damage vignette */
  if(G.dmg>0){
    const g=ctx.createRadialGradient(SW/2,SH/2,SH*0.25,SW/2,SH/2,SH*0.65);
    g.addColorStop(0,'rgba(255,30,20,0)');
    g.addColorStop(1,`rgba(255,30,20,${G.dmg*0.4})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,SW,SH);
  }
  if(G.dying){
    const p=clamp((G.time-G.dying)/1.15,0,1);
    ctx.fillStyle=`rgba(120,8,0,${p*0.72})`; ctx.fillRect(0,0,SW,SH);
    txtO('SOLD OUT…',SW/2,SH*0.45,SW*0.1*(1+p*0.15),'#fff','#4d0500',SW*0.02);
  }
}

/* the front of the line calls out their order */
function orderSpeech(o){
  const parts=(o.sections||[]).filter(s=>o.counts[s.key]>0)
    .map(s=>`${FLAVORS[s.key].ko} ${o.counts[s.key]}${s.key==='jjaguri'?'개':'인분'}`);
  return (parts.length?parts.join(' · '):'라면 1인분')+' 주세요~!';
}
function drawToasts(){
  G.toasts.forEach((tst,i)=>{
    const t=G.time-tst.t0;
    if(tst.kind==='order'){
      /* speech bubble from the customer at the front of the line */
      const pop=easeOut(t/0.22)*(1-easeIn((t-1.55)/0.35));
      if(pop<=0) return;
      const msg=orderSpeech(tst.order);
      const h=SH*0.04;
      let fs=h*0.46; ctx.font=`800 ${fs}px ${F_SANS}`;
      let tw=ctx.measureText(msg).width;
      const w=Math.min(SW*0.42,tw+h*0.9);
      if(tw>w-h*0.9){ fs*=(w-h*0.9)/tw; }
      const bx=SW*0.04, by0=SH*0.452+i*(h+8);
      const p=clamp(pop,0,1);
      ctx.save(); ctx.globalAlpha=p;
      ctx.translate(bx+w*0.14,by0+h); ctx.scale(0.7+0.3*p,0.7+0.3*p); ctx.translate(-(bx+w*0.14),-(by0+h));
      ctx.fillStyle='#FBF3E2';
      rr(ctx,bx,by0,w,h,h*0.42); ctx.fill();
      ctx.beginPath();                                   /* tail → the customer below */
      ctx.moveTo(bx+w*0.13,by0+h-1);
      ctx.lineTo(bx+w*0.08,by0+h+SH*0.02);
      ctx.lineTo(bx+w*0.26,by0+h-1);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#2A1B0C'; ctx.lineWidth=2;
      rr(ctx,bx,by0,w,h,h*0.42); ctx.stroke();
      txt(msg,bx+w/2,by0+h/2+0.5,fs,'#3A2A1E','center',F_SANS,'800');
      ctx.restore();
    }else{
      /* disappointed customer — slides in from the right */
      const slide=easeOut(t/0.25)*(1-easeIn((t-1.55)/0.35));
      const w=SW*0.62,h=SH*0.075;
      const x=SW-(w+SW*0.03)*clamp(slide,0,1), y=SH*0.615+i*(h+8);
      ctx.save(); ctx.globalAlpha=clamp(slide,0,1);
      ctx.fillStyle='rgba(12,8,4,0.88)';
      rr(ctx,x,y,w,h,h*0.3); ctx.fill();
      ctx.strokeStyle='#ff5040'; ctx.lineWidth=2;
      rr(ctx,x+1.5,y+1.5,w-3,h-3,h*0.28); ctx.stroke();
      drawCust(x+h*0.5,y+h*0.52,h*0.3,tst.order.customer,G.time,'sad');
      txt('손님이 실망했다… 💦',x+h*0.95,y+h*0.5,h*0.3,'#ff9081','left',F_SANS,'900');
      ctx.restore();
    }
  });
}
function drawConfetti(){
  for(const c of G.confetti){
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle=c.c; ctx.fillRect(-c.s/2,-c.s/2,c.s,c.s*0.6); ctx.restore();
  }
}
/* striped take-out bowl for the slurp vignette */
function drawMiniBowl(x,y,w,fk,t,tilt){
  const F=FLAVORS[fk], h=w*0.62;
  ctx.save(); ctx.translate(x,y); ctx.rotate(tilt);
  ctx.beginPath();
  ctx.moveTo(-w/2,-h*0.3); ctx.lineTo(-w*0.38,h*0.48);
  ctx.quadraticCurveTo(0,h*0.6,w*0.38,h*0.48);
  ctx.lineTo(w/2,-h*0.3); ctx.closePath();
  ctx.fillStyle='#f6efdd'; ctx.fill();
  ctx.save(); ctx.clip();
  ctx.fillStyle='#F5B31B';
  for(let i=0;i<6;i++) ctx.fillRect(-w/2+(i+0.25)*(w/6),-h*0.32,w/12,h);
  ctx.restore();
  ctx.lineWidth=2.5; ctx.strokeStyle='#20150a'; ctx.stroke();
  const dryB=fk==='buldak'||fk==='jjapa'||fk==='jjaguri';
  if(dryB){                                            /* 볶음면: 국물 없이 소스 코팅 면발 */
    ctx.fillStyle=F.deep;
    ctx.beginPath(); ctx.ellipse(0,-h*0.28,w*0.46,h*0.13,0,0,7); ctx.fill();
  }else{
    ctx.fillStyle=F.color;
    ctx.beginPath(); ctx.ellipse(0,-h*0.3,w*0.5,h*0.16,0,0,7); ctx.fill();
    ctx.fillStyle=F.deep;
    ctx.beginPath(); ctx.ellipse(0,-h*0.3,w*0.43,h*0.12,0,0,7); ctx.fill();
  }
  ctx.strokeStyle=dryB?(fk==='jjapa'?'#6E4419':fk==='jjaguri'?'#7A4A20':'#E0512E'):'#F6D468';
  ctx.lineWidth=w*(dryB?0.034:0.028); ctx.lineCap='round';
  for(let i=-1;i<=(dryB?2:1);i++){
    const nx=i*w*0.12, wob=Math.sin(t*5+i*1.7)*w*0.03;
    ctx.beginPath();
    ctx.moveTo(nx-w*0.07,-h*0.28);
    ctx.bezierCurveTo(nx+wob,-h*0.38,nx-wob,-h*0.2,nx+w*0.07,-h*0.32);
    ctx.stroke();
  }
  ctx.restore();
}
/* the customer happily slurps every finished bowl — non-blocking */
function drawEat(){
  if(!G.eat) return;
  const t=G.time-G.eat.t0, DUR=2.15, SLURP=1.44;
  if(t>DUR){ G.eat=null; return; }
  const a=t<0.15?t/0.15:t>DUR-0.22?Math.max(0,1-(t-(DUR-0.22))/0.22):1;
  const cy=SH*0.44;
  ctx.save(); ctx.globalAlpha=clamp(a,0,1);
  /* small warm spotlight — keeps the play field visible */
  const g=ctx.createRadialGradient(SW*0.64,cy,8,SW*0.64,cy,SW*0.3);
  g.addColorStop(0,'rgba(255,240,200,0.42)'); g.addColorStop(1,'rgba(255,240,200,0)');
  ctx.fillStyle=g; ctx.fillRect(SW*0.32,cy-SW*0.32,SW*0.64,SW*0.64);

  const happy=t>=SLURP, ht=t-SLURP;
  const bob=happy? -Math.abs(Math.sin(ht*9))*SH*0.014*Math.max(0,1-ht*1.1)
                 : Math.sin(t*9)*SH*0.004;
  const R=SW*0.07, fx=SW*0.72, fy=cy-SH*0.02+bob;
  const mo={x:fx-R*0.34,y:fy+R*0.5};                 /* mouth anchor */

  /* small bowl in front of the customer */
  const bw=SW*0.15, bx=SW*0.53, by=cy+SH*0.035;
  drawMiniBowl(bx,by,bw,G.eat.flavor,G.time,-0.12+Math.sin(t*6)*0.03);

  drawCust(fx,fy,R,G.eat.customer,G.time,happy?(G.eat.perfect?'happy':'yum'):'slurp');

  if(!happy){
    /* ---- chopsticks lift a FAT bundle of noodles into the mouth ---- */
    const c=0.72, p=(t%c)/c;
    const grow=easeOut(clamp(p/0.26,0,1));           /* pick up from the bowl */
    const liftP=easeOut(clamp((p-0.26)/0.36,0,1));   /* carry to the mouth   */
    const eatP=easeIn(clamp((p-0.62)/0.34,0,1));     /* whole bite goes in   */
    const bt={x:bx+bw*0.04,y:by-bw*0.3};
    const mid={x:(bt.x+mo.x)/2,y:Math.min(bt.y,mo.y)-R*1.35};
    const v=1-liftP;
    const pin={x:v*v*bt.x+2*v*liftP*mid.x+liftP*liftP*mo.x,
               y:v*v*bt.y+2*v*liftP*mid.y+liftP*liftP*mo.y};
    /* the noodle bundle — long & curly, the tasty way */
    const L=R*2.3*grow*(1-eatP);
    if(L>R*0.08){
      ctx.lineCap='round';
      const NC={buldak:['#E85A2E','#D6491F'],jjapa:['#6E4419','#5A360F'],
                jjaguri:['#7A4A20','#684018']}[G.eat.flavor]||['#F6D468','#EEC348'];
      for(let i=0;i<10;i++){
        const sx=(i-4.5)*R*0.038;
        const li=L*(0.72+((i*37)%10)/10*0.38);
        ctx.strokeStyle=NC[i%2]; ctx.lineWidth=R*0.045;
        ctx.beginPath();
        for(let k=0;k<=14;k++){
          const u=k/14;
          const wob=Math.sin(u*14+i*1.9+t*7)*R*0.16*Math.sin(u*Math.PI)*(1-eatP*0.6);  /* 꼬불꼬불 */
          const px=pin.x+sx*(0.4+u*1.3)+wob;
          const py=pin.y+li*u+Math.sin(u*6+i)*R*0.02;
          k?ctx.lineTo(px,py):ctx.moveTo(px,py);
        }
        ctx.stroke();
      }
    }
    /* mouth opens wide as the bite arrives */
    const open=clamp(liftP*0.5+eatP*0.9,0.12,1);
    ctx.fillStyle='#4A1812'; ctx.strokeStyle='#3A2A1E'; ctx.lineWidth=R*0.055;
    ctx.beginPath(); ctx.ellipse(mo.x,mo.y,R*(0.13+0.1*open),R*(0.1+0.16*open),-0.12,0,7);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#E56A72';
    ctx.beginPath(); ctx.ellipse(mo.x,mo.y+R*(0.05+0.07*open),R*0.1,R*(0.03+0.05*open),-0.12,0,7); ctx.fill();
    /* chopsticks pinching the bundle */
    ctx.strokeStyle='#4A2F16'; ctx.lineWidth=R*0.075; ctx.lineCap='round';
    for(const s of[-1,1]){
      ctx.beginPath();
      ctx.moveTo(pin.x+s*R*0.06,pin.y-R*0.02);
      ctx.lineTo(pin.x+R*1.5+s*R*0.13,pin.y-R*1.9);
      ctx.stroke();
    }
    /* wobbling slurp title */
    ctx.save(); ctx.translate(SW*0.74,cy-SH*0.118); ctx.rotate(Math.sin(t*7)*0.05);
    if(!drawArt('t_slurp',0,0,SH*0.105)) txtO('후루룩~ 🍜',0,0,SW*0.042,'#fff','rgba(20,10,0,0.85)',SW*0.009);
    ctx.restore();
  }else{
    /* ---- quick reaction pop, then out of the way ---- */
    const pop=easeOut(ht/0.16);
    ctx.save(); ctx.translate(SW*0.71,cy-SH*0.15); ctx.scale(pop,pop); ctx.rotate(Math.sin(ht*5)*0.04);
    txtO(CUST_QUOTE[G.eat.customer]||'후루룩~ 최고!',0,0,SW*0.037,'#fff','rgba(20,10,0,0.85)',SW*0.008);
    ctx.restore();
    if(G.eat.perfect){
      /* three stars stamp in + a tip coin */
      for(let i=0;i<3;i++){
        const sp=easeOut((ht-0.06-i*0.1)/0.16); if(sp<=0) continue;
        const sc=(1.6-0.6*sp)*sp;
        ctx.save(); ctx.translate(fx+(i-1)*R*0.66,fy-R*1.5); ctx.scale(sc,sc); ctx.rotate((1-sp)*0.8);
        ctx.fillStyle='#F2B21C'; ctx.strokeStyle='#8a5a00'; ctx.lineWidth=1.6;
        starP(0,0,R*0.26); ctx.fill(); ctx.stroke(); ctx.restore();
      }
      const cp=easeOut((ht-0.3)/0.2);
      if(cp>0){ const cyy=fy-R*0.2-cp*R*0.6;
        ctx.save(); ctx.globalAlpha=clamp(a,0,1)*Math.min(1,cp*2);
        ctx.fillStyle='#F4C744'; ctx.strokeStyle='#8a5a00'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(fx+R*1.15,cyy,R*0.3,0,7); ctx.fill(); ctx.stroke();
        txt('팁',fx+R*1.15,cyy+1,R*0.28,'#7a4a08','center',F_SANS,'900');
        ctx.restore(); }
      txtO('PERFECT!!',SW*0.68,cy+SH*0.075,SW*0.036,'#ffe95e','#7a2c00',SW*0.008);
    }
    txt(`+${G.eat.bonus}${G.eat.heart?'  ♥+1':''}`,SW*0.68,cy+SH*0.106,SW*0.026,'#fff','center',F_ARCADE,'400');
  }
  /* floating hearts */
  for(let i=0;i<3;i++){
    const hp=(t*1.1+i*0.33)%1;
    heart(SW*(0.8+i*0.035),fy-R*0.6-hp*SH*0.07,SW*0.018,`rgba(255,80,95,${(1-hp)*0.9})`,false);
  }
  ctx.restore();
}
function drawPads(R){
  const gap=SW*0.016;
  const cell=(SW-gap*6)/5;                     // 라면 패드도 플레이버튼과 같은 크기
  const playD=Math.min(cell,R.padH*0.95);
  const w4=cell;
  const depth=Math.max(5,SH*0.009);
  let x=gap;
  G.padRects=[];
  for(const p of PADS){
    if(p.key!=='play'){
      /* keycap-style flavor pad */
      const F=FLAVORS[p.key];
      const w=w4,h=R.padH-depth;
      const pr=clamp(1-(G.time-(G.padPress[p.key]||-9))*6,0,1);
      const press=pr*depth*0.9;
      const rad=Math.min(w,h)*0.2;
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.45)';
      rr(ctx,x+2,R.padY+depth+4,w,h,rad); ctx.fill();
      ctx.fillStyle=F.deep;                       // colored keycap side
      rr(ctx,x,R.padY+depth,w,h,rad); ctx.fill();
      if(pr>0){ ctx.shadowColor=F.color; ctx.shadowBlur=26*pr; }
      const fy=R.padY+press;
      const g2=ctx.createLinearGradient(0,fy,0,fy+h);
      g2.addColorStop(0,pr>0?'#463d33':'#2b241d');
      g2.addColorStop(1,'#100d0a');
      ctx.fillStyle=g2;
      rr(ctx,x,fy,w,h,rad); ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle=F.color; ctx.lineWidth=3;
      rr(ctx,x+2,fy+2,w-4,h-4,rad*0.85); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1.4;
      rr(ctx,x+5,fy+5,w-10,h*0.34,rad*0.7); ctx.stroke();
      if(pr>0){ ctx.save(); ctx.shadowColor='#fff'; ctx.shadowBlur=20*pr; }
      steamIcon(ctx,x+w/2,fy+h*0.31,w*0.25,pr>0?'#ffffff':F.color,3.6,p.key);
      if(pr>0) ctx.restore();
      txt(p.label,x+w/2,fy+h*0.63,w*0.2,'#fff','center',F_SANS,'900');
      txt(F.ko,x+w/2,fy+h*0.85,w*0.18,'rgba(255,255,255,0.55)','center',F_SANS,'700');
      if(pr>0&&pr<0.92){                          // release ripple
        ctx.globalAlpha=pr*0.6;
        ctx.strokeStyle=F.color; ctx.lineWidth=2.5;
        rr(ctx,x-(1-pr)*9,fy-(1-pr)*9,w+(1-pr)*18,h+(1-pr)*18,rad*1.2); ctx.stroke();
        ctx.globalAlpha=1;
      }
      ctx.restore();
      G.padRects.push({x:x+SX,y:R.padY-12,w,h:R.padH+24,key:p.key});
      x+=w+gap;
    }else{
      /* the product's round ▶❚❚ button — white ring lights up */
      const cx=x+playD/2, cy=R.padY+R.padH*0.48;
      const pr=clamp(1-(G.time-(G.padPress.play||-9))*5,0,1);
      const rad=playD/2;
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.45)';
      ctx.beginPath(); ctx.ellipse(cx+2,cy+6,rad,rad*0.96,0,0,7); ctx.fill();
      ctx.fillStyle='#2b2b30';                    // 실제 제품 버튼처럼 짙은 그레이 베젤
      ctx.beginPath(); ctx.arc(cx,cy,rad,0,7); ctx.fill();
      /* 실제 제품처럼 버튼 가장자리를 감싸는 화이트 LED 링 — 누르면 점등 */
      ctx.shadowColor='#fff'; ctx.shadowBlur=8+34*pr;
      ctx.strokeStyle=`rgba(255,255,255,${0.3+0.7*pr})`;
      ctx.lineWidth=4+pr*3;
      ctx.beginPath(); ctx.arc(cx,cy,rad*0.94,0,7); ctx.stroke();
      ctx.shadowBlur=0;
      const sc=1-pr*0.06;
      const fg=ctx.createRadialGradient(cx-rad*0.3,cy-rad*0.35,rad*0.08,cx,cy,rad*0.8);
      fg.addColorStop(0,'#39332c'); fg.addColorStop(1,'#0b0908');
      ctx.fillStyle=fg;
      ctx.beginPath(); ctx.arc(cx,cy,rad*0.78*sc,0,7); ctx.fill();
      const ir=rad*0.3*sc;
      /* silver ▶ ❚❚ side by side, vertically centered like the product */
      ctx.fillStyle='#d6d6da';
      ctx.beginPath();
      ctx.moveTo(cx-ir*1.55,cy-ir*1.05); ctx.lineTo(cx-ir*1.55,cy+ir*1.05); ctx.lineTo(cx+ir*0.05,cy); ctx.closePath(); ctx.fill();
      ctx.fillRect(cx+ir*0.45,cy-ir*0.95,ir*0.45,ir*1.9);
      ctx.fillRect(cx+ir*1.2,cy-ir*0.95,ir*0.45,ir*1.9);
      if(pr>0&&pr<0.95){                          // expanding white flash
        ctx.globalAlpha=pr*0.55;
        ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(cx,cy,rad*(0.92+(1-pr)*0.5),0,7); ctx.stroke();
        ctx.globalAlpha=1;
      }
      ctx.restore();
      G.padRects.push({x:x+SX,y:R.padY-12,w:playD,h:R.padH+24,key:'play'});
      x+=playD+gap;
    }
  }
}
/* minimal 2D deck if three.js CDN fails */
function draw2DDeckFallback(cx,cy,w){
  const h=w*0.56;
  ctx.save(); ctx.translate(cx,cy);
  ctx.fillStyle='#c07f10'; rr(ctx,-w/2,-h/2+5,w,h,w*0.09); ctx.fill();
  ctx.fillStyle='#F2A31B'; rr(ctx,-w/2,-h/2,w,h,w*0.09); ctx.fill();
  const lpx=-w*0.16,lpr=w*0.22;
  ctx.fillStyle='#141210'; ctx.beginPath(); ctx.arc(lpx,0,lpr,0,7); ctx.fill();
  ctx.fillStyle='#F5B31B'; ctx.beginPath(); ctx.arc(lpx,0,lpr*0.4,0,7); ctx.fill();
  ctx.restore();
}

/* =========================================================
   ATTRACT / GAME OVER
   ========================================================= */
function drawAttract(){
  const blink=Math.sin(G.time*4)>-0.2;
  ctx.font=`10px ${F_ARCADE}`; ctx.fillStyle='#ffe95e'; ctx.textBaseline='middle';
  ctx.textAlign='left'; ctx.fillText('1P BULDAK',SW*0.04,SH*0.04);
  if(blink){ ctx.textAlign='right'; ctx.fillText('INSERT COIN',SW*0.96,SH*0.04); }

  const bob=Math.abs(Math.sin(G.time*2.4))*SH*0.012;
  if(!drawArt('logo',SW/2,SH*0.185-bob,SW*0.92)) drawLogoBadge(ctx,SW/2,SH*0.185-bob,SW*0.82);
  for(let i=0;i<5;i++){
    const sp=(G.time*0.7+i*0.618)%1;
    const sx=SW*(0.12+((i*0.19+0.05)%0.8)),sy=SH*(0.06+((i*0.13)%0.19));
    ctx.save(); ctx.globalAlpha=Math.sin(sp*Math.PI);
    ctx.translate(sx,sy); ctx.rotate(sp*3);
    ctx.fillStyle='#ffe95e';
    for(let k=0;k<4;k++){ ctx.rotate(Math.PI/2);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(2.4,-2.4); ctx.lineTo(0,-8); ctx.lineTo(-2.4,-2.4); ctx.closePath(); ctx.fill(); }
    ctx.restore();
  }
  if(!drawArt('t_sesh',SW/2,SH*0.345,SH*0.17)) txt('Time for a cookin’ sesh!',SW/2,SH*0.32,SW*0.045,'#ffe95e','center',F_SANS,'800');

  if(!T3.ok) draw2DDeckFallback(SW/2,SH*0.47,SW*0.62);

  SEQ.forEach((f,i)=>{
    const mx=SW*(0.2+i*0.2);
    ctx.fillStyle='rgba(255,220,120,0.1)';
    ctx.beginPath(); ctx.ellipse(mx,SH*0.755,SW*0.075,SW*0.02,0,0,7); ctx.fill();
    drawMascot(mx,SH*0.75,SH*0.058,f,'dance',G.time+i*0.4);
  });

  if(Math.sin(G.time*5)>-0.3)
    comicText('GAME START',SW/2,SH*0.83,SW*0.07,'#ff4a2a');
  txt('탭 또는 아무 키나 눌러 시작!',SW/2,SH*0.878,SW*0.03,'rgba(255,255,255,0.8)');
  if(G.best>0){ ledTxt(`BEST ${String(G.best).padStart(7,'0')}`,SW/2,SH*0.92,SW*0.028,'center'); }
  txt('DJ Ramyun by 808hertz®',SW/2,SH*0.958,SW*0.026,'rgba(255,255,255,0.45)','center',F_ARCADE,'400');
  txt('game by O KWON',SW/2,SH*0.985,SW*0.015,'rgba(255,255,255,0.22)','center',F_SANS,'600');
  /* CRT scanlines */
  ctx.save(); ctx.globalAlpha=0.12; ctx.fillStyle='#000';
  for(let y=0;y<SH;y+=4) ctx.fillRect(0,y,SW,1.4);
  ctx.restore();
}

function drawGameover(){
  const t=G.time-G.stateT;
  const drop=easeOut(t/0.6);
  const cy=lerp(-SH*0.5,SH*0.075,drop);
  const cw=SW*0.88,ch=SH*0.66,cx0=(SW-cw)/2;
  ctx.fillStyle='rgba(0,0,0,0.45)'; rr(ctx,cx0+6,cy+8,cw,ch,SW*0.05); ctx.fill();
  ctx.fillStyle='#F5B31B'; rr(ctx,cx0,cy,cw,ch,SW*0.05); ctx.fill();
  ctx.save(); ctx.globalAlpha=0.07;
  ctx.fillStyle='#000';
  for(let yy=cy;yy<cy+ch;yy+=12) ctx.fillRect(cx0,yy,cw,5);
  ctx.restore();
  ctx.strokeStyle='#1c150c'; ctx.lineWidth=4; rr(ctx,cx0+3,cy+3,cw-6,ch-6,SW*0.045); ctx.stroke();

  txtO('GAME OVER',SW/2,cy+ch*0.1,SW*0.088,'#1c150c','#fff',SW*0.016);
  if(G.newBest&&Math.sin(G.time*8)>0)
    txt('★ NEW BEST! ★',SW/2,cy+ch*0.18,SW*0.045,'#e0301e','center',F_SANS,'900');
  ctx.font=`12px ${F_ARCADE}`; ctx.fillStyle='#5c3a00'; ctx.textAlign='center';
  ctx.fillText('FINAL SCORE',SW/2,cy+ch*0.255);
  ctx.font=`${SW*0.093}px ${F_ARCADE}`; ctx.fillStyle='#1c150c';
  ctx.fillText(String(G.score).padStart(7,'0'),SW/2,cy+ch*0.35);

  const rows=[['서빙한 그릇',G.bowls+'그릇'],['PERFECT 주문',G.perfectOrders+'개'],
              ['최고 콤보','×'+G.maxCombo],['베스트',String(Math.max(G.best,G.score)).padStart(7,'0')]];
  rows.forEach((r_,i)=>{
    const ry=cy+ch*(0.45+i*0.06);
    txt(r_[0],SW*0.22,ry,SW*0.035,'#5c3a00','left',F_SANS,'800');
    txt(r_[1],SW*0.78,ry,SW*0.035,'#1c150c','right',F_SANS,'900');
  });
  SEQ.forEach((f,i)=>drawMascot(SW*(0.26+i*0.16),cy+ch*0.81,SH*0.04,f,'idle',G.time+i*0.3));
  txt('DJ Ramyun by 808hertz®',SW/2,cy+ch*0.9,SW*0.029,'#5c3a00','center',F_SANS,'800');
  txt('game by O KWON',SW/2,cy+ch*0.95,SW*0.018,'rgba(92,58,0,0.5)','center',F_SANS,'700');

  const bw=SW*0.4,bh=SH*0.06,by=cy+ch+SH*0.028;
  const bx1=SW/2-bw-SW*0.02,bx2=SW/2+SW*0.02;
  ctx.fillStyle='#e0301e'; rr(ctx,bx1,by,bw,bh,bh/2); ctx.fill();
  txt('다시 도전!',bx1+bw/2,by+bh/2,bh*0.42,'#fff','center',F_SANS,'900');
  ctx.fillStyle='#1c150c'; rr(ctx,bx2,by,bw,bh,bh/2); ctx.fill();
  txt('스코어 공유 📤',bx2+bw/2,by+bh/2,bh*0.38,'#fff','center',F_SANS,'900');
  G.btnRects={retry:{x:bx1+SX,y:by,w:bw,h:bh},share:{x:bx2+SX,y:by,w:bw,h:bh}};
  txt('빈 곳을 탭하면 타이틀로',SW/2,by+bh+SH*0.028,SW*0.027,'rgba(255,255,255,0.6)');
}

/* =========================================================
   SHARE CARD
   ========================================================= */
function shareScore(){
  const c=document.createElement('canvas'); c.width=1080; c.height=1350;
  const g=c.getContext('2d');
  g.fillStyle='#F5B31B'; g.fillRect(0,0,1080,1350);
  g.fillStyle='rgba(0,0,0,0.06)';
  for(let y=0;y<1350;y+=26) for(let x=0;x<1080;x+=26){ g.beginPath(); g.arc(x+((y/26)%2)*13,y,4,0,7); g.fill(); }
  g.strokeStyle='#1c150c'; g.lineWidth=14; g.strokeRect(28,28,1024,1294);
  g.textAlign='center';
  g.font=`130px ${F_DISP}`; g.lineWidth=20; g.lineJoin='round';
  g.strokeStyle='#fff'; g.strokeText('DJ Ramyun',540,220);
  g.fillStyle='#1c150c'; g.fillText('DJ Ramyun',540,220);
  g.font=`64px ${F_DISP}`; g.fillStyle='#e0301e'; g.fillText('ORDER RUSH',540,320);
  g.font=`44px ${F_ARCADE}`; g.fillStyle='#5c3a00'; g.fillText('FINAL SCORE',540,470);
  g.font=`140px ${F_ARCADE}`; g.fillStyle='#1c150c'; g.fillText(String(G.score).padStart(7,'0'),540,630);
  g.font=`52px ${F_SANS}`;
  g.fillText(`${G.bowls}그릇 서빙 · PERFECT ${G.perfectOrders} · MAX COMBO ×${G.maxCombo}`,540,760);
  g.font=`250px ${F_SANS}`; g.fillText('🍜',540,1040);
  g.font=`44px ${F_SANS}`; g.fillStyle='#5c3a00';
  g.fillText('DJ Ramyun by 808hertz®',540,1170);
  g.font=`28px ${F_SANS}`; g.fillStyle='rgba(92,58,0,0.55)';
  g.fillText('game by O KWON',540,1225);
  c.toBlob(async b=>{
    if(!b) return;
    const file=new File([b],'dj-ramyun-score.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'DJ Ramyun — ORDER RUSH',
        text:`DJ Ramyun ORDER RUSH에서 ${G.score}점! 🍜🎧 #DJRamyun #808hertz`}); return; }catch(e){}
    }
    const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='dj-ramyun-score.png'; a.click();
  },'image/png');
}

/* =========================================================
   INPUT
   ========================================================= */
function pointAt(px,py){
  if(G.state==='attract'){ padTap(null); return; }
  if(G.state==='over'){
    const b=G.btnRects;
    if(b.retry&&px>=b.retry.x&&px<=b.retry.x+b.retry.w&&py>=b.retry.y&&py<=b.retry.y+b.retry.h){ coinFX(); startGame(); return; }
    if(b.share&&px>=b.share.x&&px<=b.share.x+b.share.w&&py>=b.share.y&&py<=b.share.y+b.share.h){ shareScore(); return; }
    setState('attract'); return;
  }
  if(G.state==='game'){
    for(const r of G.padRects)
      if(px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h){ padTap(r.key); return; }
  }
}
uiC.addEventListener('pointerdown',e=>{ e.preventDefault(); initAudio(); pointAt(e.clientX,e.clientY); },{passive:false});
document.addEventListener('visibilitychange',()=>{   /* iOS: 앱 복귀 시 사운드 복구 */
  if(!document.hidden && A.ctx && A.ctx.state==='suspended') A.ctx.resume();
});
const KEYMAP={'1':'ramyun','2':'buldak','3':'jjapa','4':'neogury',
              'd':'ramyun','f':'buldak','j':'jjapa','k':'neogury',' ':'play'};
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  initAudio();
  if(G.state==='attract'){ padTap(null); e.preventDefault(); return; }
  if(G.state==='over'&&(e.key==='Enter'||e.key===' ')){ coinFX(); startGame(); e.preventDefault(); return; }
  if(e.key.toLowerCase()==='m'){ A.muted=!A.muted; if(A.master) A.master.gain.value=A.muted?0:0.9; return; }
  const k=KEYMAP[e.key.toLowerCase()];
  if(k){ padTap(k); e.preventDefault(); }
});
/* (timeline pause-shift now lives in frame(): any render stall
   >0.4s pushes note times forward, so returning from a hidden
   tab/panel resumes exactly where the player left off) */

/* =========================================================
   MAIN LOOP
   ========================================================= */
let lastT=performance.now();
function frame(tms){
  const raw=(tms-lastT)/1000;
  // render stalled (hidden tab / panel switch) → shift the timeline so the game pauses instead of failing
  if(G.state==='game' && raw>0.4 && !(window.DJ&&window.DJ.noShift)){
    for(const n of G.notes) n.time+=raw;
    G.cursorT+=raw;
    if(A.ctx) A.nextBeat=anow()+0.1;
  }
  const dt=Math.min(0.05,raw); lastT=tms;
  G.time+=dt;
  update(dt);
  update3D(dt);
  drawBG();

  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,VW,VH);
  if(G.shake>0) ctx.translate(rand(-G.shake,G.shake)*0.5,rand(-G.shake,G.shake)*0.5);
  ctx.translate(SX,0);
  ctx.save();
  ctx.beginPath(); ctx.rect(0,0,SW,SH); ctx.clip();   // clip to the game column so nothing bleeds into the letterbox

  if(G.state==='attract') drawAttract();
  else if(G.state==='game') drawGame();
  else if(G.state==='over') drawGameover();

  if(A.muted) txtO('🔇 음소거 — M 키로 해제',SW/2,SH*0.018,SW*0.026,'#fff','rgba(0,0,0,0.85)',SW*0.006);

  if(G.flash>0){ ctx.fillStyle=rgbStr(G.flashCol,G.flash*0.35); ctx.fillRect(0,0,SW,SH); }
  ctx.restore();
}
function loop(tms){ frame(tms); requestAnimationFrame(loop); }

window.DJ={G,A,T3,anow:()=>anow(),pnow:()=>pnow(),noShift:false,padTap:(p)=>padTap(p),
  forceState:(s)=>{G.state=s;G.stateT=G.time;},step:()=>frame(performance.now())};

resize();
initAudio();   /* suspended 상태로 미리 생성 — 디코딩은 가능, 소리는 첫 터치에 resume */
init3D();
requestAnimationFrame(loop);
/* fallback ticker — keeps the game alive at ~30fps if rAF is throttled (webview/panel) */
setInterval(()=>{ const t=performance.now(); if(t-lastT>45) frame(t); },33);
</script>
