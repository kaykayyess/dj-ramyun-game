function initAudio(){

  try{
    const AC = window.AudioContext||window.webkitAudioContext;
    A.ctx = new AC();
    if (A.ctx.state==='suspended') A.ctx.resume();
    const comp=A.ctx.createDynamicsCompressor();
    comp.threshold.value=-14; comp.ratio.value=6;
    A.master=A.ctx.createGain(); A.master.gain.value=0.9;
    A.master.connect(comp);
    comp.connect(A.ctx.destination);   /* 항상 직결 — 스트림 경유는 iOS에서 150~400ms 지연이라 리듬게임에 부적합.
                                          무음 스위치 우회는 unlockAudio()의 무음 <audio> 루프가 담당 */
    const len=A.ctx.sampleRate*1.2;
    A.noiseBuf=A.ctx.createBuffer(1,len,A.ctx.sampleRate);
    const d=A.noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    for(const k in A.raw) decodeSFX(k);

}

/* iOS: 사용자 제스처 안에서 확실하게 오디오 잠금 해제
   + 무음(진동) 스위치 우회 — 무음 <audio> 루프를 재생해 'playback' 세션으로 전환
   (무음 스위치가 켜져 있으면 WebAudio만으로는 소리가 전부 죽는다) */
function unlockAudio(){
  initAudio();
  if(A.ctx&&A.ctx.state!=='running'){ try{ A.ctx.resume(); }catch(e){} }
  if(!A.ctx||A._unlocked) return;
  try{  /* 클래식 언락: 빈 버퍼 1샘플 재생 */
    const b=A.ctx.createBuffer(1,1,22050), src=A.ctx.createBufferSource();
    src.buffer=b; src.connect(A.ctx.destination); src.start(0);
  }catch(e){}

  try{  /* 무음 WAV 태그 (0.08초 무음 루프, playsinline) */
    if(!A._sil){
      const sr=8000,n=(sr*0.08)|0,ab=new ArrayBuffer(44+n*2),v=new DataView(ab);
      const W=(o,t)=>{for(let i=0;i<t.length;i++)v.setUint8(o+i,t.charCodeAt(i));};
      W(0,'RIFF'); v.setUint32(4,36+n*2,true); W(8,'WAVEfmt '); v.setUint32(16,16,true);
      v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,sr,true);
      v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
      W(36,'data'); v.setUint32(40,n*2,true);
      const au=document.createElement('audio');
      au.src=URL.createObjectURL(new Blob([ab],{type:'audio/wav'}));
      au.loop=true; au.setAttribute('playsinline',''); au.setAttribute('webkit-playsinline','');

    }
    const pr=A._sil.play();
    if(pr&&pr.then) pr.then(()=>{ A._unlocked=true; },()=>{});

}

const BGM_FILES={beat1:['beat1.mp3','beat1.wav','BEAT1.mp3','Beat1.mp3'],

function beatTierForOrder(no){
  if(no>=15) return 'beat3';
  if(no>=7)  return 'beat2';
  return 'beat1';
}
/* 실제 로드된 버퍼로 폴백 (파일이 아직 없거나 디코딩 전이면 있는 것 사용) */
function resolveBeat(want){
  if(A.mbuf[want]) return want;
  for(const k of ['beat1','beat2','beat3']) if(A.mbuf[k]) return k;
  return '';
}
A.mraw={}; A.mbuf={}; A.bgm=null; A.bgmKey='';
/* 추가 SFX 후보(파일 넣으면 자동 활성): 후루룩 먹는 소리 · 냄비 보글보글 루프 */
const EXTRA_SFX={slurp1:['SLURP1.wav'],slurp2:['SLURP2.wav'],slurp4:['SLURP4.wav'],   /* SLURP3는 삭제됨 */
                 boil:['BOIL.wav','BOIL.mp3','boil.wav','boil.mp3']};
for(const k in EXTRA_SFX){
  (async()=>{ for(const f of EXTRA_SFX[k]){
    try{ const r=await fetch('sfx/'+encodeURIComponent(f)); if(!r.ok) continue;
      A.raw[k]=await r.arrayBuffer(); if(A.ctx) decodeSFX(k); return; }catch(e){}
  } })();
}
for(const k in BGM_FILES){
  (async()=>{ for(const f of BGM_FILES[k]){
    try{ const r=await fetch('sfx/'+encodeURIComponent(f)); if(!r.ok) continue;
      A.mraw[k]=await r.arrayBuffer(); if(A.ctx) decodeBGM(k); return; }catch(e){}
  } })();
}
function decodeBGM(k){
  const b=A.mraw[k]; if(!b||A.mbuf[k]) return;
  A.ctx.decodeAudioData(b.slice(0)).then(d=>{
    A.mbuf[k]=d;
    const ch=d.getChannelData(0), sr=d.sampleRate;      /* mp3 앞뒤 무음 트림 → 루프·그리드 정확 */
    let i0=0; while(i0<ch.length&&Math.abs(ch[i0])<0.02) i0++;
    let i1=ch.length-1; while(i1>i0&&Math.abs(ch[i1])<0.02) i1--;
    A.mtrim=A.mtrim||{}; A.mtrim[k]={lead:i0/sr,end:(i1+1)/sr};
  }).catch(()=>{});
}
function bgmStop(){
  if(A.bgm){ try{ A.bgm.g.gain.setTargetAtTime(0,A.ctx.currentTime,0.3); A.bgm.src.stop(A.ctx.currentTime+1); }catch(e){}
    A.bgm=null; A.bgmKey=''; }
}
function bgmUpdate(){
  if(!A.ctx){ return; }
  if(A.boil){ try{ A.boil.g.gain.setTargetAtTime(0,A.ctx.currentTime,0.2); A.boil.src.stop(A.ctx.currentTime+0.8); }catch(e){} A.boil=null; }
  if(A.muted) return;
  if(G.state!=='game'){ if(A.bgm) bgmStop(); return; }
  for(const k in A.mraw) decodeBGM(k);
  /* 피버/THE DROP = 항상 최고조 비트(beat3), 아니면 주문 진행에 맞춘 단계 비트 */
  const wantTier=(G.fever||G.time<G.drop)?'beat3':beatTierForOrder(G.curOrderNo||1);
  const want=resolveBeat(wantTier);
  if(!want||want===A.bgmKey) return;
  bgmStop();
  const src=A.ctx.createBufferSource(); src.buffer=A.mbuf[want]; src.loop=true;
  const g=A.ctx.createGain(); g.gain.value=0.001;
  A.bgmVol=0.55*(A.MUSIC_VOL[want]||1);
  g.gain.setTargetAtTime(A.bgmVol,A.ctx.currentTime,0.25);   /* 비트 든든하게 */
  src.connect(g); g.connect(A.master);
  const tr=(A.mtrim&&A.mtrim[want])||{lead:0,end:src.buffer.duration};
  src.loopStart=tr.lead; src.loopEnd=tr.end;           /* 무음 없는 구간만 루프 → 드리프트 방지 */
  /* 앵커 = 첫 비트가 '귀에 닿는' pnow 시각 (출력 레이턴시 보정) */
  const lat=A.ctx.outputLatency||A.ctx.baseLatency||0;
  let when=A.ctx.currentTime+0.05, earAt=pnow()+0.05+lat;
  if(A.bgmAnchor&&A.bgmBpm){                           /* 트랙 전환도 기존 박자선 위에서 */
    const bl=60/A.bgmBpm;
    const wait=(bl-(((earAt-A.bgmAnchor)%bl)+bl)%bl)%bl;
    when+=wait; earAt+=wait;
  }
  src.start(when,tr.lead);
  A.bgmAnchor=earAt; A.bgmBpm=A.MUSIC_BPM[want]||90;
  A.bgm={src,g}; A.bgmKey=want;
}
function boilUpdate(){
  if(!A.ctx) return;
  const want=G.state==='game'&&!A.muted&&A.buf.boil;
  if(want&&!A.boil){
    const src=A.ctx.createBufferSource(); src.buffer=A.buf.boil; src.loop=true;
    if(!A.boilTrim){                                   /* 앞뒤 무음 잘라 心지 구간만 루프 */
      const ch=src.buffer.getChannelData(0), sr=src.buffer.sampleRate;
      let i0=0; while(i0<ch.length&&Math.abs(ch[i0])<0.02) i0++;
      let i1=ch.length-1; while(i1>i0&&Math.abs(ch[i1])<0.02) i1--;
      A.boilTrim={a:i0/sr+0.1, b:(i1+1)/sr-0.1};
    }
    src.loopStart=A.boilTrim.a; src.loopEnd=Math.max(A.boilTrim.a+1,A.boilTrim.b);
    const g=A.ctx.createGain(); g.gain.value=0.001;
    g.gain.setTargetAtTime(0.14,A.ctx.currentTime,0.5);   /* 배경에 깔리는 보글보글 */
    src.connect(g); g.connect(A.master); src.start(0,A.boilTrim?A.boilTrim.a:0);
    A.boil={src,g};
  }else if(!want&&A.boil){
    try{ A.boil.g.gain.setTargetAtTime(0,A.ctx.currentTime,0.3); A.boil.src.stop(A.ctx.currentTime+1); }catch(e){}

}
function bgmDuck(){                                      /* 사이드체인: 버튼 소리 순간 비트가 눌림 */
  if(!A.bgm) return;

function schedulerUpdate(){
  if(!A.ctx||G.state!=='game'||A.muted) return;
  bgmUpdate();
  if(A.bgm) return;                                      /* 비트 파일이 돌면 신스 비트는 침묵 */
  const spb=60/G.bpm;
  if(A.nextBeat < anow()-0.4) A.nextBeat = anow()+0.05;
  while(A.nextBeat < anow()+0.18){
    const t=A.nextBeat, n=A.beatN, b=n%8, sw=spb*0.56;   /* 스윙 오프셋 */
    /* 붐뱁 킥: 정박 + 엇박 */
    if(b===0||b===2||b===5) kick(t,0.45);
    if(b===3) kick(t+sw,0.3);
    if(b===6&&(n>>3)%2===1) kick(t+spb/2,0.26);
    /* 스윙 햇 + 고콤보 16비트 시즐 */
    if(G.combo>=4){
      hat(t,0.12); hat(t+sw,b%2?0.09:0.055);
      if(G.combo>=30&&b%2===1) hat(t+spb*0.25,0.045);
    }
    /* 스네어 2·4박 + 고스트 노트 */
    if(G.combo>=8){
      if(b%2===1) snare(t,0.25);
      if(b===6) snare(t+sw,0.08);
    }
    /* 베이스 — 현재 flavor 루트를 따라가는 펜타토닉 라인 */
    if(G.combo>=14){
      const root={ramyun:55,buldak:49,jjapa:41.2,neogury:46.2,jjaguri:43.7}[bgFlavor()]||55;
      const mel=[1,0,1.5,0, 1,1.19,0,0.75][b];
      if(mel) bassN(t,root*mel,spb*0.7,0.21);
    }
    if(G.fever&&b%4===0) clap(t,0.18);
    /* 8박마다 바 마무리 필 */
    if(b===7){
      if(G.combo>=8){ snare(t+spb*0.5,0.11); snare(t+spb*0.75,0.16); }
      noiseHit({t:t+spb*0.5,type:'highpass',f0:9000,dur:0.18,v:0.05});
    }
    A.nextBeat+=spb; A.beatN++;
  }
}

  const r=Math.random();
  const secN = no<=14?1 : no<=20?(r<0.3?2:1) : (r<0.12?3:r<0.6?2:1); /* 한 사람당 보통 1개 */
  /* 인분 성장 곡선: 1인분만 → 2인분 → 3인분 → 4인분 */
  let mn=1,mx=1;
  if(no>=5){ mx=2; }
  if(no>=9){ mn=2; mx=3; }
  if(no>=13){ mn=2; mx=4; }
  /* 콤보가 쌓이면 몰아친다 — 미스로 콤보가 깨지면 다시 숨 돌릴 틈 */
  /* 반박자 노트 섞임 비율 — 주문이 쌓일수록, 콤보가 높을수록 서서히 */
  const dbl = clamp((no-8)/20,0,0.62) + (G.combo>=25?0.12:0) + (G.combo>=50?0.08:0);   /* 후반은 연타 지옥 */
  return {bpm, secN, mn, mx, dbl:clamp(dbl,0,0.8)};
}
function pushOrder(){
  const no=++G.orderCount;
  const p=orderParams(no);
  const spb=60/p.bpm;
  const order={no, total:0, hit:0, miss:0, customer:pickCust(), bpm:p.bpm, counts:{}, sections:[]};
  /* a real order: usually one item, sometimes two, more when the shop gets slammed */
  let pool=[...SEQ];
  const secs=[];
  if(no>=12 && Math.random()<0.35){ secs.push('jjaguri'); pool=pool.filter(f=>f!=='jjapa'&&f!=='neogury'); }  /* 짜파구리는 4인분 경험 후 해금 */
  while(secs.length<p.secN && pool.length) secs.push(pool.splice(irand(0,pool.length-1),1)[0]);
  if(!secs.length) secs.push('ramyun');
  G.diff=Math.min(1,(no-1)/22);                    /* 난이도 지표 (판정창·점수 배율) */
  const gap = Math.max(1, Math.round(4.4 - no*0.12 - G.combo/16));  /* 후반엔 주문이 거의 연달아 */
  let t=G.cursorT;
  if(A.bgmAnchor&&A.bgmBpm){                       /* 음악 박자선에 스냅 */
    const bl=60/A.bgmBpm;
    t=A.bgmAnchor+Math.ceil((t-A.bgmAnchor)/bl-1e-4)*bl;
  }
  for(const f of secs){
    if(f==='jjaguri'){
      const n=irand(1,2);                          /* 짜파구리 1개=짜파1+너1 · 2개=짜파2+너2 */
      order.counts[f]=n; order.sections.push({key:f,n});
      order.total+=n*2+1;
      for(let i=0;i<n;i++){ G.notes.push({type:'tap',flavor:'jjapa',sec:f,time:t,order,bpm:p.bpm}); t+=spb*(Math.random()<p.dbl?0.5:1); }
      for(let i=0;i<n;i++){ G.notes.push({type:'tap',flavor:'neogury',sec:f,time:t,order,bpm:p.bpm}); t+=spb*(Math.random()<p.dbl?0.5:1); }
    }else{
      const n=irand(p.mn,p.mx);
      order.counts[f]=n; order.sections.push({key:f,n});
      order.total+=n+1;
      for(let i=0;i<n;i++){ G.notes.push({type:'tap',flavor:f,sec:f,time:t,order,bpm:p.bpm}); t+=spb*(Math.random()<p.dbl?0.5:1); }
    }
    G.notes.push({type:'play',flavor:f,sec:f,time:t,order,bpm:p.bpm}); t+=spb*gap;
  }
  G.notes[G.notes.length-1].last=true;
  G.cursorT=t+spb;
}
/* 연습 손님: 라면 2인분(탭2 + PLAY) 짧고 느긋한 그리드 — 성공할 때까지 반복 */
function pushTutorialOrder(){
  const bt=beatTierForOrder(0);                                  /* 초반 비트(beat1) */
  const pb=(A.mbuf&&A.mbuf[bt])?A.MUSIC_BPM[bt]:86;
  const spb=60/pb;
  const order={no:0, tut:true, total:0, hit:0, miss:0, customer:pickCust(), bpm:pb, counts:{}, sections:[]};
  let t=G.cursorT;
  if(A.bgmAnchor&&A.bgmBpm){ const bl=60/A.bgmBpm; t=A.bgmAnchor+Math.ceil((t-A.bgmAnchor)/bl-1e-4)*bl; }
  const f='ramyun', n=2;
  order.counts[f]=n; order.sections.push({key:f,n});
  order.total+=n+1;
  for(let i=0;i<n;i++){ G.notes.push({type:'tap',flavor:f,sec:f,time:t,order,bpm:pb}); t+=spb; }
  G.notes.push({type:'play',flavor:f,sec:f,time:t,order,bpm:pb,last:true}); t+=spb*4;   /* PLAY 뒤 넉넉한 텀 */
  G.cursorT=t+spb;
}
function setState(s){ G.state=s; G.stateT=G.time; if(s!=='game'&&A.ctx) bgmStop(); }
function startGame(){
  G.score=0; G.lives=3; G.combo=0; G.maxCombo=0; G.bowls=0; G.orderCount=0; G.perfectOrders=0;
  G.notes=[]; G.noteIdx=0; G.bpm=96; G.fever=false; G.dying=0; G.newBest=false;
  G.fx.length=0; G.toasts.length=0; G.confetti.length=0; G.curOrderNo=0; G.curSection=''; G.eat=null; G.drop=0; G.dropT0=0;
  G.tut=!window.__tutDone;   /* 접속마다 첫 판은 연습 손님 — 같은 세션 재도전은 생략 */
  G.space=0;                 /* 우주는 매 판 다시 열어야 한다 */
  G.hypeLv=0;                /* 맛집 명성도 매 판 다시 쌓는다 */
  G.scroll=0.27;         /* 첫 판이면 1번 주문 = 연습 모드 */
  G.cursorT = pnow() + 4*(60/96);
  if(T3.ok) T3.serveClear();
  G.pStreak=0;
  setState('game');
  if(A.ctx){ A.nextBeat=anow()+0.05; A.beatN=0; bgmUpdate(); }   /* 먼저 비트를 걸고 */
  if(G.tut) pushTutorialOrder();                                  /* 연습 손님부터 (성공까지 반복) */
  else { pushOrder(); pushOrder(); }                              /* 그 그리드 위에 주문 생성 */
  spawnFX({kind:'artslam',art:'',text:i18n('open'),t0:G.time+0.4});
}

/* ---------- judgment ---------- */
function padTap(pad){
  if(G.state==='attract'){ initAudio(); coinFX(); startGame(); return; }
  if(G.state!=='game'||G.dying) return;
  G.padPress[pad]=G.time;
  const note=G.notes[G.noteIdx]; if(!note) return;
  const w=windows();
  const dt=pnow()-note.time;
  if(dt < -w.b) return;                              // way early → ignore
  const need = note.type==='play' ? 'play' : note.flavor;
  if(pad!==need){ markMiss(note,'wrong'); return; }  // wrong pad = that note is lost
  const a=Math.abs(dt);
  applyJudge(a<=w.p?'perfect':a<=w.g?'good':'bad', note);
}
function applyJudge(j,note){
  const mult=j==='perfect'?1:j==='good'?0.7:0.3;
  const pts=Math.round(100*mult*diffMult()*(1+G.combo/100))*(G.fever?2:1)*(G.time<G.drop?3:1);
  G.score+=pts;
  if(j==='bad') G.combo=0;
  else{
    G.combo++; G.comboT=G.time;
    G.maxCombo=Math.max(G.maxCombo,G.combo);
    if(G.combo===20){ spawnFX({kind:'banner',text:i18n('fever'),t0:G.time}); feverFX(); }
    if(G.combo>=25 && G.combo%25===0){             /* 25 단위 콤보 축포 */
      G.flash=0.5; G.flashCol=[255,205,60];
      G.shake=Math.max(G.shake,7);
      spawnFX({kind:'artslam',art:'',text:`COMBO ${G.combo}!!`,t0:G.time});
      feverFX();
      for(let i=0;i<18;i++) G.confetti.push({x:SW*0.5+rand(-SW*0.22,SW*0.22),y:SH*0.38,vx:rand(-90,90),vy:rand(-190,-70),rot:rand(0,6.3),vr:rand(-5,5),c:['#F2C14E','#ffe95e','#fff','#E8431F'][i%4],s:rand(4,9)});
    }
  }
  G.fever = G.combo>=20;
  judgeFX(j);
  const vol=j==='perfect'?1:j==='good'?0.7:0.35;
  const R=regions();
  if(note.type==='play'){
    const serv=clamp(note.order.counts[note.sec||note.flavor]||1,1,4);
    let played=false;
    if(note.flavor==='jjaguri')        /* 짜파구리: 전용 스팅어만, 이전 소리 즉시 컷 */
      played=playBuf('guri'+serv,vol*0.61,1,{group:'play',cut:'fast',skipSilence:true})
           ||playBuf('jja'+serv,vol*0.58,1,{group:'play',cut:'fast',skipSilence:true});
    else played=playBuf(SFX_KEY[note.flavor]+serv,vol*0.58,1,{group:'play',skipSilence:true});
    if(!played) dropFX(note.flavor,vol);                                 /* 샘플 미디코딩 시 신스 폴백 */
    spawnFX({kind:'drop',flavor:note.flavor,serv,t0:G.time+0.1});        /* 타이포는 사운드 성공 여부와 무관하게 항상 */
    G.flash=0.45; G.flashCol=hex2rgb(FLAVORS[note.flavor].color);
    G.shake=Math.max(G.shake,j==='perfect'?9:5);
    T3.punch=1; T3.burst=1;
    if(T3.ok) T3.showTop(note.flavor);
  }else{
    if(!playBuf(SFX_KEY[note.flavor]+'_t',vol*0.64)) tapFX(note.flavor,vol*0.64);
    if(T3.ok) T3.addNoodle();
    if(j==='perfect') for(let i=0;i<6;i++)
      spawnFX({kind:'spark',x:R.judgeX,y:R.railY,a:rand(0,6.3),v:rand(60,190),c:FLAVORS[note.flavor].color,t0:G.time});
  }
  spawnFX({kind:'judge',j,x:R.judgeX,y:R.railY-SH*0.008,t0:G.time});
  spawnFX({kind:'ring',x:R.judgeX,y:R.railY,color:FLAVORS[note.flavor].color,t0:G.time,big:note.type==='play',pow:j==='perfect'?1:0.55});
  note.judged=j; note.order.hit++;
  G.noteIdx++;
  if(note.last) finishOrder(note.order);
}
function markMiss(note,reason){
  note.judged='miss'; note.order.miss++;
  G.combo=0; G.fever=false;
  if(!note.order.tut) G.lives--;                   /* 연습 주문은 하트가 안 닳는다 */
  G.dmg=1; G.shake=Math.max(G.shake,8); T3.shake3=1;
  scratchFX();
  const R=regions();
  spawnFX({kind:'judge',j:'miss',x:R.judgeX,y:R.railY-SH*0.008,t0:G.time});
  spawnFX({kind:'heartbreak',t0:G.time});
  G.noteIdx++;
  if(note.last) finishOrder(note.order);
  if(G.lives<=0 && !G.dying){ G.dying=G.time; }
}
function domOf(order){
  let bf='ramyun',n=-1;
  for(const s of (order.sections||[])) if(order.counts[s.key]>n){ n=order.counts[s.key]; bf=s.key; }
  return bf;
}
function finishOrder(order){
  const ratio=order.hit/order.total;
  /* 냄비는 즉시 안 비운다 — 손님이 먹는 동안 3D 면이 실제로 줄어든다 (drawEat가 처리) */
  if(order.tut){                                   /* 연습 손님: 성공(전부 명중)할 때까지 반복 */
    if(order.miss===0){                            /* 다 맞췄다 → 졸업, 진짜 영업 시작 */
      G.tut=false; window.__tutDone=true;
      G.bowls++; G.score+=500;
      slurpFX();
      G.eat={t0:G.time,customer:order.customer,bonus:500,perfect:true,heart:false,flavor:'ramyun',spice:0,serv:2};
      for(let i=0;i<18;i++) G.confetti.push({x:rand(0,SW),y:rand(-SH*0.1,0),vx:rand(-30,30),vy:rand(60,160),rot:rand(0,6.3),vr:rand(-4,4),c:FLAVORS[SEQ[i%4]].color,s:rand(4,9)});
      spawnFX({kind:'banner',text:i18n('first_bowl'),t0:G.time});
      pushOrder(); pushOrder();
    }else{                                          /* 놓쳤다 → 벌칙 없이 다시 연습 손님 */
      if(T3.ok) T3.serveClear();
      G.combo=0; G.fever=false;
      spawnFX({kind:'banner',text:i18n('tut_retry'),t0:G.time});
      pushTutorialOrder();
    }
    return;
  }
  if(order.miss===0){
    const b=Math.round(1000*diffMult())*(G.fever?2:1);
    G.score+=b; G.bowls++; G.perfectOrders++;
    G.pStreak=(G.pStreak||0)+1;                    /* 소문 단계는 update()의 hypeTier()가 판정 */
    const gotHeart = G.lives<3;
    if(gotHeart) G.lives=Math.min(3,G.lives+1);
    if(!order.counts.jjaguri) slurpFX();          /* 드랍이 대신 울린다 */
    if(gotHeart) heartFX();
    G.eat={t0:G.time,customer:order.customer,bonus:b,perfect:true,heart:gotHeart,flavor:domOf(order),spice:domOf(order)==='buldak'?(order.counts.buldak||1):0,serv:order.counts[domOf(order)]||1};
    for(let i=0;i<22;i++) G.confetti.push({x:rand(0,SW),y:rand(-SH*0.1,0),vx:rand(-30,30),vy:rand(60,160),rot:rand(0,6.3),vr:rand(-4,4),c:FLAVORS[SEQ[i%4]].color,s:rand(4,9)});
    /* 짜파구리 퍼펙트 = THE DROP!! turntable spins up, everything ×3 */
    if(order.counts.jjaguri && !G.dying){
      const already=G.time<G.drop;                /* 연속 드랍: 시간만 연장, 사운드 중첩 금지 */
      G.drop=G.time+5.2; if(!already) G.dropT0=G.time;
      G.fx=G.fx.filter(f=>f.kind!=='drop');          /* 드랍 순간엔 THAT'S A BANGER 하나만 */
      /* 오디오는 짜파구리 전용 스팅어 하나만 — 드랍은 비주얼로 말한다 */
      T3.punch=1.4; T3.burst=1.6; G.shake=Math.max(G.shake,10);
      for(let i=0;i<30;i++) G.confetti.push({x:rand(0,SW),y:rand(-SH*0.15,0),vx:rand(-60,60),vy:rand(80,220),rot:rand(0,6.3),vr:rand(-5,5),c:['#F2C14E','#E8431F','#FFF6E0'][i%3],s:rand(5,10)});
    }
  }else if(ratio>=0.6){
    G.pStreak=0;
    const b=Math.round(400*diffMult());
    G.score+=b; G.bowls++;
    slurpFX();
    G.eat={t0:G.time,customer:order.customer,bonus:b,perfect:false,heart:false,flavor:domOf(order),spice:domOf(order)==='buldak'?(order.counts.buldak||1):0,serv:order.counts[domOf(order)]||1};
  }else{
    if(T3.ok) T3.serveClear();                     /* 손님이 안 먹고 감 — 그릇 회수 */
    G.pStreak=0;
    G.toasts.push({kind:'angry',t0:G.time,order});
  }
}

/* 맛집 소문 단계: 게임이 충분히 진행되고 + 퍼펙트가 이어질 때만 서서히 */
function hypeTier(){
  const ps=G.pStreak||0, no=G.curOrderNo||0;
  return (ps>=12&&no>=14)?3:(ps>=8&&no>=10)?2:(ps>=4&&no>=6)?1:0;
}

/* ---------- flow update ---------- */
function update(dt){
  updateFX(dt);
  if(G.state!=='game'){ if(A.bgm) bgmStop(); return; }
  schedulerUpdate();
  // keep the conveyor stocked
  if(!G.tut && G.cursorT - pnow() < 10) pushOrder();
  if(G.noteIdx>220){ G.notes.splice(0,200); G.noteIdx-=200; }
  { const ht=hypeTier();                            /* 소문 단계 상승 순간만 축하 */
    if(ht>(G.hypeLv||0)){ G.hypeLv=ht; spawnFX({kind:'banner',text:i18n('hype'+ht),t0:G.time+0.5}); }
    else if(ht<(G.hypeLv||0)) G.hypeLv=ht; }
  /* 난이도 = 속도감: 주문·콤보에 따라 노트가 넓은 간격 그대로 더 빠르게 흐른다 */
  const scTgt=0.27+clamp((G.curOrderNo-4)*0.016,0,0.30)+Math.min(0.10,G.combo*0.0018);
  G.scroll=lerp(G.scroll,scTgt,Math.min(1,dt*0.7));
  const cn=G.notes[G.noteIdx];
  if(cn){
    if(cn.bpm!==G.bpm) G.bpm=cn.bpm;
    if(cn.order.no!==G.curOrderNo){
      G.curOrderNo=cn.order.no;
      G.toasts.push({kind:'order',t0:G.time,order:cn.order});
    }
    /* each section = one bowl: pot resets and is sized by that section's servings (1~4) */
    const sk=cn.sec||cn.flavor, sec=cn.order.no+'-'+sk;
    if(sec!==G.curSection && !G.eat){                /* 손님이 먹는 동안엔 냄비를 안 바꾼다 — 다 먹고 전환 */
      G.curSection=sec;
      if(T3.ok){ T3.serveClear(); T3.setPotFor((sk==='jjaguri'?2:1)*cn.order.counts[sk]); }  /* 짜파구리 1개=2봉지 규모 */
    }
    if(!G.dying && pnow() > cn.time + windows().b) markMiss(cn,'late');
  }
  if(G.dying && G.time-G.dying>1.15){
    if(G.score>G.best){ G.best=G.score; localStorage.setItem('djr_best',G.best); G.newBest=true; }
    if(G.newBest) lbSubmit(G.score);   /* 개인 최고점 갱신 때만 전송 — 쓰기 절약 */
    setState('over');
    if(G.score>0 && !hasNick() && !window.__nickAsked){   /* 첫 기록 후 1회만 닉네임 유도 */
      window.__nickAsked=true; setTimeout(nickPrompt,900);
    }
  }
}

/* =========================================================
   FX
   ========================================================= */
function spawnFX(o){
  /* 플레이 타이포('drop')는 사운드와 짝 — 배너·축포에 절대 지워지면 안 된다.
     drop끼리만(최신 우선), 배너/슬램끼리만 정리 — 서로는 안 건드림 */
  if(o.kind==='drop') G.fx=G.fx.filter(f=>f.kind!=='drop');
  else if(o.kind==='banner'||o.kind==='artslam')
    G.fx=G.fx.filter(f=>f.kind!=='banner'&&f.kind!=='artslam');
  if(o.kind==='drop'||G.fx.length<80) G.fx.push(o);   /* 타이포는 캡 무시하고 항상 표시 */
}
function updateFX(dt){
  G.fx=G.fx.filter(f=>G.time-f.t0 < ((f.kind==='banner'||f.kind==='artslam')?1.4:f.kind==='drop'?1.15:0.8));
  G.toasts=G.toasts.filter(t=>G.time-t.t0<1.9);
  for(const c of G.confetti){ c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=140*dt; c.rot+=c.vr*dt; }
  G.confetti=G.confetti.filter(c=>c.y<SH+30);
  G.shake=Math.max(0,G.shake-dt*40);
  G.flash=Math.max(0,G.flash-dt*2.2);
  G.dmg=Math.max(0,G.dmg-dt*1.8);
}

/* =========================================================
   3D — DJ Ramyun deck + cooking performance
   ========================================================= */
const T3={ok:false,punch:0,burst:0,shake3:0,ledText:'',steam:[],bubbles:[]};
function mkTex(w,h,draw){ const c=document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'),w,h); const t=new THREE.CanvasTexture(c); t.anisotropy=4;
  if(THREE.SRGBColorSpace!==undefined) t.colorSpace=THREE.SRGBColorSpace;   /* 색 이중변환 방지 — 원색 그대로 */
  return {t,c}; }
function stick(a,b,r,color,rough=0.5){
  const d=new THREE.Vector3().subVectors(b,a);
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,d.length(),10),
    new THREE.MeshStandardMaterial({color,roughness:rough}));
  m.position.copy(a).addScaledVector(d,0.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), d.clone().normalize());
  return m;
}
function drawLPTex(g){
  g.fillStyle='#131110'; g.fillRect(0,0,1024,1024);
  for(let i=0;i<30;i++){ g.strokeStyle=`rgba(255,255,255,${0.025+Math.random()*0.05})`;
    g.lineWidth=2+Math.random()*2.4; g.beginPath(); g.arc(512,512,205+i*10,0,7); g.stroke(); }
  g.fillStyle='#E8A02A'; g.beginPath(); g.arc(512,512,195,0,7); g.fill();
  g.fillStyle='#141210'; g.textAlign='center'; g.textBaseline='middle';
  g.font=`64px ${F_DISP}`; g.fillText('DJ',512,395);
  g.font=`58px ${F_DISP}`; g.fillText('Ramyun',512,455);

function setLED(text){

  const m=document.createElement('canvas'); m.width=128; m.height=32;
  const mg=m.getContext('2d');
  let fs=26; mg.font=`${fs}px ${F_ARCADE}`;
  while(fs>10 && mg.measureText(text).width>120){ fs--; mg.font=`${fs}px ${F_ARCADE}`; }
  mg.textAlign='center'; mg.textBaseline='middle';
  mg.fillStyle='#fff'; mg.fillText(text,64,17);
  const d=mg.getImageData(0,0,128,32).data;
  g.fillStyle='rgba(120,60,10,0.18)';                       /* unlit dots */
  for(let yy=0;yy<32;yy+=2) for(let xx=0;xx<128;xx+=2){
    g.beginPath(); g.arc(xx*4+2,yy*4+2,1.3,0,7); g.fill(); }
  g.fillStyle='#ffb02e'; g.shadowColor='#ff9d1e'; g.shadowBlur=7;
  for(let yy=0;yy<32;yy++) for(let xx=0;xx<128;xx++)
    if(d[(yy*128+xx)*4+3]>110){ g.beginPath(); g.arc(xx*4+2,yy*4+2,1.75,0,7); g.fill(); }
  g.shadowBlur=0;
  T3.led.t.needsUpdate=true;
}

    /* --- 우상단 망고 노브 (실물의 원형 캡) --- */
    const knobTopM=new THREE.MeshPhysicalMaterial({color:0xFFA714,roughness:0.28,metalness:0.02,emissive:0x8a4e00,emissiveIntensity:0.28,
      clearcoat:0.7,clearcoatRoughness:0.2,envMapIntensity:0.9});
    const knobTop=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,0.16,36),knobTopM);   /* 매끈한 1단 */
    knobTop.position.set(1.20,0.53,-0.70); knobTop.castShadow=true; T3.root.add(knobTop);

    /* --- steam sprites --- */
    const st=mkTex(128,128,(g)=>{ const gr=g.createRadialGradient(64,64,6,64,64,62);
      gr.addColorStop(0,'rgba(255,255,255,0.85)'); gr.addColorStop(0.55,'rgba(255,255,255,0.28)');
      gr.addColorStop(1,'rgba(255,255,255,0)'); g.fillStyle=gr; g.fillRect(0,0,128,128); });
    for(let i=0;i<14;i++){
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:st.t,transparent:true,opacity:0,depthWrite:false}));
      sp.userData={ph:rand(0,1)};
      T3.scene.add(sp); T3.steam.push(sp);
    }
    /* --- 3D characters: DJ behind the deck + the waiting line --- */
    T3.chibiCache={};
    T3.qSlots=[...Array(6)].map(()=>({type:null,grp:null}));



    T3.root.position.y=-1.15;
    T3.ok=true;
    setLED('ON');
    resize3D();
  }catch(e){ T3.ok=false; }
}
function resize3D(){
  if(!T3.ok) return;
  T3.renderer.setPixelRatio(DPR);
  T3.camera.aspect=SW/VH; T3.camera.updateProjectionMatrix();
  T3.renderer.setSize(SW,VH,false);
}
function update3D(dt){
  if(!T3.ok) return;
  T3.punch=Math.max(0,T3.punch-dt*2.6);
  T3.burst=Math.max(0,T3.burst-dt*1.4);
  T3.shake3=Math.max(0,T3.shake3-dt*3.2);
  const fb=FLAVORS[bgFlavor()];
  /* LP spin */
  const dropOn=G.time<G.drop;
  T3.lp.rotation.y -= dt*(1.3+Math.min(2.4,G.combo*0.07)+T3.punch*6+(dropOn?9:0));
  /* pot: bob + servings-based size + plop pulse when an ingredient lands */
  T3.plop=Math.max(0,T3.plop-dt*4);
  T3.potR=lerp(T3.potR,T3.potTR,Math.min(1,dt*4));
  T3.potH=lerp(T3.potH,T3.potTH,Math.min(1,dt*4));
  const plp=1+T3.plop*0.06;
  T3.pot.scale.set(T3.potR*plp,T3.potH*plp,T3.potR*plp);
  T3.pot.position.y=0.51+Math.sin(G.time*5.2)*0.006+T3.punch*0.05+T3.plop*0.03;   /* LP 위에 안착 */
  const dryN=fb.key==='buldak'||fb.key==='jjapa'||fb.key==='jjaguri';   /* 볶음면 — 국물 없이 소스만 */
  T3.noodles.position.y=Math.sin(G.time*4.1)*0.012+(dryN?0.022:0);
  T3.noodles.rotation.y+=dt*0.25;
  /* noodle strands & toppings pop in */
  for(const n of T3.noodleTubes){
    const s=lerp(n.scale.x,n.userData.tgt,Math.min(1,dt*8));
    n.scale.setScalar(s);
  }
  for(const k in T3.tops){
    const g=T3.tops[k];
    g.scale.setScalar(lerp(g.scale.x,g.userData.tgt,Math.min(1,dt*7)));
  }
  /* broth: color shift + slow swirl (볶음면은 낮게 깔린 소스로) */
  T3.broth.rotation.z+=dt*(0.25+T3.punch*1.5);
  T3.broth.position.y=lerp(T3.broth.position.y,dryN?0.303:0.345,Math.min(1,dt*3));
  const bsc=lerp(T3.broth.scale.x,dryN?0.85:1,Math.min(1,dt*3));
  T3.broth.scale.setScalar(bsc);
  T3.brothMat.roughness=dryN?0.34:0.07;
  T3.brothMat.clearcoat=dryN?0.25:1;
  T3.brothMat.color.lerp(new THREE.Color(fb.broth),0.05);
  T3.brothMat.emissive.lerp(new THREE.Color(fb.broth),0.05);   /* 국물색 그대로 발광 — 쨍한 라면색 */
  T3.brothMat.emissiveIntensity=(fb.key==='jjapa'?0.16:0.5)+T3.punch*1.3+(G.fever?0.3+0.18*Math.sin(G.time*9):0);
  /* noodles pick up the sauce — dark for jjapa, red-tinged for buldak */
  T3.noodleMat.color.lerp(new THREE.Color(fb.key==='jjapa'?0x6E4419:fb.key==='jjaguri'?0xA5702F:fb.key==='buldak'?0xE88A38:0xF6D468),0.05);
  T3.noodleMat.emissive.copy(T3.noodleMat.color).multiplyScalar(0.22);   /* 면발도 또렷하게 */
  /* induction heat — the LP visibly glows under the pot */
  const heat=(G.state==='game'?1:0.2)*(0.55+Math.min(0.45,G.combo*0.02));
  const hb=0.5+0.5*Math.sin(G.time*7);
  T3.heatRing.material.opacity=heat*(0.14+0.24*hb)+T3.punch*0.35;
  T3.heatRing.scale.setScalar(Math.min(T3.potR,0.95)*(1+0.04*hb));
  T3.heatLight.intensity=heat*(0.7+0.9*hb)+T3.punch*2.2;
  /* play button ring lights up white on press */
  const pp=clamp(1-(G.time-(G.padPress.play||-9))*4,0,1);
  T3.playRing.material.opacity=0.4+0.6*pp;
  T3.playRing.scale.setScalar(1+pp*0.15);
  T3.playGlow.material.opacity=pp*0.75;
  /* bubbles */
  for(const b of T3.bubbles){
    b.visible=!dryN;                                   /* 볶음면은 끓는 기포 없음 */
    const u=b.userData; u.ph+=dt*u.sp*(1+G.combo*0.02+T3.punch);
    const p=(Math.sin(u.ph)+1)/2;
    b.position.y=0.35+p*0.05; b.scale.setScalar(0.6+p*0.8);
    b.material.opacity=0.35+p*0.4;
  }
  /* steam — thicker with combo, bursts on drop */
  const inten=(G.state==='game'?0.55:0.3)+Math.min(0.8,G.combo*0.03)+T3.burst*1.3;
  T3.steam.forEach((sp,i)=>{
    const u=sp.userData;
    u.ph+=dt*(0.22+i%3*0.05)*(1+T3.burst*1.6);
    if(u.ph>1){ u.ph=0; u.x=rand(-0.3,0.3); u.z=rand(-0.3,0.3); }
    const p=u.ph;
    sp.position.set((u.x||0)+Math.sin(p*7+i)*0.16, -1.15+0.9+p*2.1, (u.z||0)+Math.cos(p*5+i)*0.1);
    const s=0.35+p*1.5+T3.burst*0.4;
    sp.scale.set(s,s,1);
    sp.material.opacity=Math.sin(p*Math.PI)*0.34*inten;
  });
  /* --- the famous-shop line: 3D chibi customers waiting --- */
  if(T3.qSlots){
    const want=[];
    if(G.state==='game'){
      /* 처음엔 지금 손님 딱 1명 — 인기가 쌓여야 줄이 생긴다 (도파민 성장 곡선) */
      const cap=Math.min(6,1+(G.hypeLv||0)+(G.orderCount>=12?1:0)+(G.orderCount>=24?1:0));
      const seen=new Set();
      for(let i=G.noteIdx;i<G.notes.length&&want.length<Math.min(3,cap);i++){
        const o=G.notes[i].order;
        if(!seen.has(o.no)){ seen.add(o.no); want.push(o.customer); }
      }
      /* 남는 자리는 소문 듣고 온 구경꾼으로 */
      const extra=Math.min(3,Math.max(0,cap-want.length));
      const EX=['bey','tay','lisa','nicki','billie','jay','nigo','em'];   /* 여5:남3 */
      for(let k=0;k<extra;k++) want.push(EX[(k*2+1)%EX.length]);
      T3.hype=G.hypeLv||0;
    }
    T3.qSlots.forEach((sl,i)=>{
      const ty=want[i]||null;
      if(ty!==sl.type){
        if(sl.grp){ T3.root.remove(sl.grp); sl.grp=null; }
        if(ty){
          sl.grp=(T3.chibiCache[ty]||(T3.chibiCache[ty]=mkChibi(ty))).clone();
          sl.grp.position.set(-1.68-0.2*i,0,0.75-0.55*i);
          sl.grp.rotation.y=0.55;
          sl.grp.scale.setScalar(0.92);
          T3.root.add(sl.grp);
        }
        sl.type=ty;
      }
      if(sl.grp) sl.grp.position.y = i===0
        ? Math.abs(Math.sin(G.time*3.2))*0.06        /* front of the line can't wait */
        : Math.sin(G.time*(1.8+(T3.hype||0)*0.6)+i*1.7)*(0.015+(T3.hype||0)*0.01)+0.015+(T3.hype||0)*0.01;   /* 소문나면 들썩들썩 */
    });
  }
  /* flavor light */
  T3.flavorLight.color.set((G.fever||dropOn)
    ? `hsl(${(G.time*(dropOn?340:140))%360},95%,60%)` : fb.color);
  T3.flavorLight.intensity=2.0+T3.punch*3.4+(G.fever?0.9:0)+(dropOn?1.8:0);
  T3.playRing.material.color.set(G.fever?0xffd9a8:0xffffff);
  /* LED */
  if(G.state==='attract') setLED('ON');
  else if(G.state==='over') setLED('GAME OVER');
  else setLED(G.fever?'FEVER!!':FLAVORS[bgFlavor()].label);
  /* camera */
  const cam=T3.camera;
  const shk=T3.shake3*0.06;
  if(G.state==='attract'){
    const a=Math.sin(G.time*0.25)*0.45;
    cam.position.set(Math.sin(a)*0.9,2.9+Math.sin(G.time*0.4)*0.1,8.2);
    cam.lookAt(0,-0.55,0);
  }else{
    const dz=dropOn?0.6+Math.sin(G.time*10.5)*0.12:0;   /* drop: punch in & pulse to the beat */
    cam.position.set(
      Math.sin(G.time*0.3)*0.12+rand(-shk,shk),
      3.0+Math.sin(G.time*0.8)*0.05+rand(-shk,shk),
      8.8-T3.punch*0.35-dz);
    cam.lookAt(0.15,-0.15+T3.punch*0.05,0);
  }
  T3.renderer.render(T3.scene,T3.camera);
}

function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}
function txt(str,x,y,size,color,align='center',font=F_SANS,weight='800'){
  ctx.font=`${weight} ${size}px ${font}`;

  ctx.fillText(str,x,y);
}
function txtO(str,x,y,size,fill,stroke,lw,align='center',font=F_DISP){
  ctx.font=`${size}px ${font}`;
  ctx.textAlign=align; ctx.textBaseline='middle';

}
/* DJ Ramyun oval badge (gold ring · red ring · cream field · red bubble letters) */
function drawLogoBadge(c,cx,cy,w){
  const h=w*0.69, rx=w/2, ry=h/2;
  c.save(); c.translate(cx,cy);
  c.textAlign='center'; c.textBaseline='middle'; c.lineJoin='round';
  const oval=(sx,sy)=>{ c.beginPath(); c.ellipse(0,0,sx,sy,0,0,7); };
  /* soft drop shadow */
  c.save(); c.shadowColor='rgba(0,0,0,0.35)'; c.shadowBlur=w*0.04; c.shadowOffsetY=w*0.012;
  c.fillStyle='#FBF7EE'; oval(rx,ry); c.fill(); c.restore();
  /* gold outer ring */
  c.strokeStyle='#E8A83E'; c.lineWidth=w*0.05; oval(rx-w*0.028,ry-w*0.028); c.stroke();
  /* red inner ring */
  c.strokeStyle='#CE3A22'; c.lineWidth=w*0.028; oval(rx-w*0.088,ry-w*0.088); c.stroke();
  /* bubble lettering — auto-fit to the cream field so nothing overflows the rings */
  const word=(t,y,s,maxW,tr)=>{
    c.letterSpacing=(tr||0)+'px';
    c.font=`${s}px ${F_DISP}`;
    const tw=c.measureText(t).width+s*0.30;      // include outline thickness
    if(tw>maxW) s*=maxW/tw, c.font=`${s}px ${F_DISP}`;
    c.strokeStyle='#E8A83E'; c.lineWidth=s*0.30; c.strokeText(t,s*0.03,y+s*0.04);   // gold under-shadow
    c.strokeStyle='#FBF7EE'; c.lineWidth=s*0.20; c.strokeText(t,0,y);                // cream outline
    c.fillStyle='#CE3A22';   c.fillText(t,0,y);                                       // red fill
    c.letterSpacing='0px';
  };
  word('DJ',      -h*0.205, w*0.27, w*0.5);
  word('Ramyun',   h*0.205, w*0.288, w*0.84, -w*0.008);   // +20% larger, tighter tracking
  c.restore();
}
function ledTxt(str,x,y,size,align='left'){

  ctx.shadowColor='#ffab2e'; ctx.shadowBlur=size*0.7;
