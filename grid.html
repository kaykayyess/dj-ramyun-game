<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{background:#222;margin:0;padding:8px;font-family:Arial}
.g{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.c{background:#000;border:1px solid #555;text-align:center;padding:4px}
.c img{width:100%;height:150px;object-fit:contain}
.c div{color:#ffe95e;font-size:11px;font-weight:bold}
</style></head><body><div class="g" id="g"></div><script>
const F=['RAM Play.svg','RAM2 Play.svg','RAM3 Play.svg','RAM4 Play.svg',
'BURR Play.svg','BURR2 Play.svg','BURR3 Play.svg','BURR4 play.svg',
'JJAP Play.svg','JJAP2 Play.svg','JJAP3 Play.svg','JJAP4 Play.svg',
'NEO Play.svg','NEO2 Play.svg','NEO3 Play.svg','NEO4 Play.svg'];
g.innerHTML=F.map(f=>`<div class="c"><img src="art/${encodeURIComponent(f)}"><div>${f}</div></div>`).join('');
</script></body></html>
